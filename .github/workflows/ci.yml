name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'

      - name: Build
        run: CGO_ENABLED=0 go build -buildvcs=false ./cmd/proxy/ ./cmd/cli/

      - name: Test
        run: go test -buildvcs=false -count=1 -timeout 120s ./internal/...

      - name: Vet
        run: go vet ./...

      - name: Docker build
        run: docker build -t oauth4os:ci .
