name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

env:
  ECR_REPO: 544277935543.dkr.ecr.us-west-2.amazonaws.com/oauth4os

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'

      - name: Test
        run: go test -buildvcs=false -count=1 -timeout 120s ./internal/...

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF_NAME}
          LDFLAGS="-s -w -X main.version=${VERSION}"
          for GOOS in linux darwin; do
            for GOARCH in amd64 arm64; do
              OUT="oauth4os-${GOOS}-${GOARCH}"
              [ "$GOOS" = "darwin" ] && OUT="oauth4os-macos-${GOARCH}"
              CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH \
                go build -buildvcs=false -ldflags "$LDFLAGS" -o "dist/${OUT}" ./cmd/proxy/
              CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH \
                go build -buildvcs=false -ldflags "$LDFLAGS" -o "dist/${OUT}-cli" ./cmd/cli/
            done
          done
          cd dist && sha256sum * > checksums.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-west-2
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker build + push
        run: |
          docker build -t $ECR_REPO:${GITHUB_REF_NAME} -t $ECR_REPO:latest .
          docker push $ECR_REPO:${GITHUB_REF_NAME}
          docker push $ECR_REPO:latest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
