name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

env:
  ECR_REPO: 544277935543.dkr.ecr.us-west-2.amazonaws.com/oauth4os

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'

      - name: Test
        run: go test -buildvcs=false -count=1 -timeout 120s ./internal/...

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-west-2
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        continue-on-error: true

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2
        continue-on-error: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Fallback: manual Docker build if goreleaser docker fails
      - name: Docker fallback — ECR push
        if: always()
        run: |
          docker build -t $ECR_REPO:${GITHUB_REF_NAME} -t $ECR_REPO:latest . || true
          docker push $ECR_REPO:${GITHUB_REF_NAME} || true
          docker push $ECR_REPO:latest || true
