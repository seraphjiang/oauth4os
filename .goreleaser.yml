version: 2

builds:
  - id: proxy
    main: ./cmd/proxy
    binary: oauth4os
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags: -s -w -X main.version={{.Version}}

  - id: cli
    main: ./cmd/cli
    binary: oauth4os-cli
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags: -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

dockers:
  - image_templates:
      - "ghcr.io/seraphjiang/oauth4os:{{ .Version }}-amd64"
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
    goarch: amd64
  - image_templates:
      - "ghcr.io/seraphjiang/oauth4os:{{ .Version }}-arm64"
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
    goarch: arm64

docker_manifests:
  - name_template: "ghcr.io/seraphjiang/oauth4os:{{ .Version }}"
    image_templates:
      - "ghcr.io/seraphjiang/oauth4os:{{ .Version }}-amd64"
      - "ghcr.io/seraphjiang/oauth4os:{{ .Version }}-arm64"
  - name_template: "ghcr.io/seraphjiang/oauth4os:latest"
    image_templates:
      - "ghcr.io/seraphjiang/oauth4os:{{ .Version }}-amd64"
      - "ghcr.io/seraphjiang/oauth4os:{{ .Version }}-arm64"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^style:"
