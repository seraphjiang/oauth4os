name: 'oauth4os — Get Scoped Token'
description: 'Get a scoped OAuth token from oauth4os for OpenSearch operations in CI/CD'
author: 'seraphjiang'

branding:
  icon: 'lock'
  color: 'blue'

inputs:
  proxy-url:
    description: 'oauth4os proxy URL (e.g., https://oauth.example.com)'
    required: true
  client-id:
    description: 'OAuth client ID'
    required: true
  client-secret:
    description: 'OAuth client secret'
    required: true
  scope:
    description: 'Requested scope (e.g., "read:logs-* write:logs-*")'
    required: false
    default: 'read:*'

outputs:
  token:
    description: 'OAuth access token'
  expires-in:
    description: 'Token TTL in seconds'

runs:
  using: 'composite'
  steps:
    - name: Get token
      id: get-token
      shell: bash
      env:
        PROXY_URL: ${{ inputs.proxy-url }}
        CLIENT_ID: ${{ inputs.client-id }}
        CLIENT_SECRET: ${{ inputs.client-secret }}
        SCOPE: ${{ inputs.scope }}
      run: |
        RESPONSE=$(curl -sf -X POST "${PROXY_URL}/oauth/token" \
          -d "grant_type=client_credentials" \
          -d "client_id=${CLIENT_ID}" \
          -d "client_secret=${CLIENT_SECRET}" \
          -d "scope=${SCOPE}")

        TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')
        EXPIRES=$(echo "$RESPONSE" | jq -r '.expires_in')

        if [ "$TOKEN" = "null" ] || [ -z "$TOKEN" ]; then
          echo "::error::Failed to get token from oauth4os"
          echo "$RESPONSE" >&2
          exit 1
        fi

        echo "::add-mask::${TOKEN}"
        echo "token=${TOKEN}" >> "$GITHUB_OUTPUT"
        echo "expires-in=${EXPIRES}" >> "$GITHUB_OUTPUT"
        echo "✅ Got scoped token (expires in ${EXPIRES}s)"
