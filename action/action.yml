name: "oauth4os Token"
description: "Get a scoped OAuth token from oauth4os for OpenSearch operations in CI"
inputs:
  proxy-url:
    description: "oauth4os proxy URL"
    required: true
  client-id:
    description: "Client ID"
    required: true
  client-secret:
    description: "Client secret"
    required: true
  scope:
    description: "Requested scope (e.g. read:logs-*)"
    required: true
outputs:
  token:
    description: "OAuth access token"
    value: ${{ steps.get-token.outputs.token }}
  expires-in:
    description: "Token TTL in seconds"
    value: ${{ steps.get-token.outputs.expires_in }}
runs:
  using: composite
  steps:
    - id: get-token
      shell: bash
      run: |
        RESPONSE=$(curl -sf -X POST "${{ inputs.proxy-url }}/oauth/token" \
          -d "grant_type=client_credentials" \
          -d "client_id=${{ inputs.client-id }}" \
          -d "client_secret=${{ inputs.client-secret }}" \
          -d "scope=${{ inputs.scope }}")
        TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')
        EXPIRES=$(echo "$RESPONSE" | jq -r '.expires_in // 3600')
        if [ "$TOKEN" = "null" ] || [ -z "$TOKEN" ]; then
          echo "::error::Failed to get token: $RESPONSE"
          exit 1
        fi
        echo "::add-mask::$TOKEN"
        echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
        echo "expires_in=$EXPIRES" >> "$GITHUB_OUTPUT"
