openapi: 3.0.3
info:
  title: oauth4os — OAuth 2.0 Proxy for OpenSearch
  description: |
    OAuth 2.0 proxy that validates JWT tokens, maps scopes to OpenSearch
    security roles, and forwards requests to Engine and Dashboards.
  version: 1.0.0
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  contact:
    url: https://github.com/seraphjiang/oauth4os

servers:
  - url: http://localhost:8443
    description: Local development

tags:
  - name: Token
    description: OAuth token lifecycle
  - name: Auth
    description: PKCE and client registration
  - name: Introspection
    description: RFC 7662 token introspection
  - name: Discovery
    description: OIDC discovery
  - name: Admin
    description: Runtime configuration management
  - name: Proxy
    description: Reverse proxy to OpenSearch
  - name: Operational
    description: Health and metrics

paths:
  /oauth/token:
    post:
      tags: [Token]
      summary: Issue or refresh a token
      description: |
        Supports `client_credentials` and `refresh_token` grant types.
        Returns an access token with mapped scopes.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [grant_type]
              properties:
                grant_type:
                  type: string
                  enum: [client_credentials, refresh_token]
                client_id:
                  type: string
                  description: Client identifier
                client_secret:
                  type: string
                  description: Client secret
                scope:
                  type: string
                  description: Space-separated scopes (e.g., "read:logs-* write:dashboards")
                refresh_token:
                  type: string
                  description: Refresh token (for refresh_token grant)
      responses:
        "200":
          description: Token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Invalid client credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /oauth/token/{id}:
    get:
      tags: [Token]
      summary: Get token details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Token details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Token"
        "404":
          description: Token not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags: [Token]
      summary: Revoke a token
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Token revoked

  /oauth/tokens:
    get:
      tags: [Token]
      summary: List active tokens
      responses:
        "200":
          description: List of active (non-revoked) tokens
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Token"

  /oauth/introspect:
    post:
      tags: [Introspection]
      summary: Introspect a token (RFC 7662)
      description: Requires client authentication (Basic Auth or form-encoded client_id/client_secret)
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        "200":
          description: Token introspection response
          content:
            application/json:
              schema:
                type: object
                properties:
                  active:
                    type: boolean
                  client_id:
                    type: string
                  scope:
                    type: string
                  exp:
                    type: integer
                    format: int64

  /oauth/authorize:
    get:
      tags: [Auth]
      summary: PKCE authorization endpoint
      description: Initiates authorization code flow with PKCE for browser clients.
      parameters:
        - name: client_id
          in: query
          required: true
          schema:
            type: string
        - name: code_challenge
          in: query
          required: true
          schema:
            type: string
        - name: code_challenge_method
          in: query
          schema:
            type: string
            default: S256
            enum: [S256, plain]
        - name: redirect_uri
          in: query
          required: true
          schema:
            type: string
            format: uri
        - name: scope
          in: query
          schema:
            type: string
      responses:
        "302":
          description: Redirect with authorization code
        "400":
          description: Missing required parameters

  /oauth/authorize/token:
    post:
      tags: [Auth]
      summary: Exchange authorization code for token (PKCE)
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [code, code_verifier, redirect_uri]
              properties:
                code:
                  type: string
                code_verifier:
                  type: string
                redirect_uri:
                  type: string
                  format: uri
      responses:
        "200":
          description: Token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          description: Invalid code or verifier

  /oauth/register:
    post:
      tags: [Auth]
      summary: Dynamic client registration (RFC 7591)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                client_name:
                  type: string
                scope:
                  type: string
                  description: Requested scope allowlist
                redirect_uris:
                  type: array
                  items:
                    type: string
                    format: uri
      responses:
        "201":
          description: Client registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  client_id:
                    type: string
                  client_secret:
                    type: string
                  client_name:
                    type: string

  /oauth/register/{client_id}:
    get:
      tags: [Auth]
      summary: Get registered client details
      parameters:
        - name: client_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Client details
        "404":
          description: Client not found

  /.well-known/openid-configuration:
    get:
      tags: [Discovery]
      summary: OIDC discovery document
      responses:
        "200":
          description: OpenID Connect discovery metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  issuer:
                    type: string
                  token_endpoint:
                    type: string
                  introspection_endpoint:
                    type: string
                  authorization_endpoint:
                    type: string
                  registration_endpoint:
                    type: string
                  scopes_supported:
                    type: array
                    items:
                      type: string
                  grant_types_supported:
                    type: array
                    items:
                      type: string

  /health:
    get:
      tags: [Operational]
      summary: Health check
      responses:
        "200":
          description: Proxy is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 0.2.0
                  uptime_seconds:
                    type: integer

  /metrics:
    get:
      tags: [Operational]
      summary: Prometheus metrics
      responses:
        "200":
          description: Prometheus text format metrics
          content:
            text/plain:
              schema:
                type: string

  /admin/scope-mappings:
    get:
      tags: [Admin]
      summary: List scope mappings
      responses:
        "200":
          description: Current scope-to-role mappings
    put:
      tags: [Admin]
      summary: Update scope mappings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties:
                $ref: "#/components/schemas/Role"
      responses:
        "200":
          description: Mappings updated

  /admin/providers:
    get:
      tags: [Admin]
      summary: List OIDC providers
      responses:
        "200":
          description: Configured providers
    post:
      tags: [Admin]
      summary: Add OIDC provider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Provider"
      responses:
        "201":
          description: Provider added

  /admin/providers/{name}:
    delete:
      tags: [Admin]
      summary: Remove OIDC provider
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Provider removed

  /admin/tenants:
    get:
      tags: [Admin]
      summary: List tenants
      responses:
        "200":
          description: Configured tenants

  /admin/tenants/{issuer}:
    put:
      tags: [Admin]
      summary: Update tenant configuration
      parameters:
        - name: issuer
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tenant updated
    delete:
      tags: [Admin]
      summary: Remove tenant
      parameters:
        - name: issuer
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Tenant removed

  /admin/cedar-policies:
    get:
      tags: [Admin]
      summary: List Cedar policies
      responses:
        "200":
          description: Active Cedar policies
    post:
      tags: [Admin]
      summary: Add Cedar policy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, policy]
              properties:
                id:
                  type: string
                policy:
                  type: string
                  description: Cedar policy text
      responses:
        "201":
          description: Policy added

  /admin/cedar-policies/{id}:
    delete:
      tags: [Admin]
      summary: Remove Cedar policy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Policy removed

  /admin/rate-limits:
    get:
      tags: [Admin]
      summary: List rate limit configuration
      responses:
        "200":
          description: Rate limit settings
    put:
      tags: [Admin]
      summary: Update rate limits
      responses:
        "200":
          description: Rate limits updated

  /oauth/par:
    post:
      summary: Pushed Authorization Request (RFC 9126)
      tags: [OAuth]
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                client_id: { type: string }
                scope: { type: string }
                redirect_uri: { type: string }
                code_challenge: { type: string }
                code_challenge_method: { type: string }
      responses:
        '201': { description: Request URI issued }

  /oauth/device/code:
    post:
      summary: Device Authorization (RFC 8628) — request codes
      tags: [OAuth]
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                client_id: { type: string }
                scope: { type: string }
      responses:
        '200': { description: Device and user codes }

  /oauth/device/token:
    post:
      summary: Device flow — poll for token
      tags: [OAuth]
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                grant_type: { type: string, enum: ['urn:ietf:params:oauth:grant-type:device_code'] }
                device_code: { type: string }
      responses:
        '200': { description: Token issued }
        '400': { description: authorization_pending or access_denied }

  /oauth/bc-authorize:
    post:
      summary: CIBA — initiate backchannel authentication
      tags: [OAuth]
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                client_id: { type: string }
                login_hint: { type: string }
                scope: { type: string }
      responses:
        '200': { description: Auth request ID }

  /oauth/bc-token:
    post:
      summary: CIBA — poll for token
      tags: [OAuth]
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                auth_req_id: { type: string }
      responses:
        '200': { description: Token issued }
        '400': { description: authorization_pending or access_denied }

  /developer/tokens:
    get:
      summary: Token inspector page
      tags: [Developer]
      responses:
        '200': { description: HTML token inspector dashboard }

  /admin/api/stats:
    get:
      summary: Token store statistics
      tags: [Admin API]
      responses:
        '200':
          description: JSON with total, active, revoked, expired, clients, refresh counts

  /admin/api/clients:
    get:
      summary: List registered clients (no secrets)
      tags: [Admin API]
      responses:
        '200':
          description: Array of ClientInfo objects

  /admin/api/tokens:
    get:
      summary: List active tokens (IDs truncated)
      tags: [Admin API]
      responses:
        '200':
          description: Array of active token summaries

  /admin/api/keys:
    get:
      summary: Current signing key info
      tags: [Admin API]
      responses:
        '200':
          description: Current KID, algorithm, creation time, JWKS URI

  /admin/api/policies:
    get:
      summary: List all Cedar policies
      tags: [Admin API]
      responses:
        '200':
          description: Array of Policy objects
    post:
      summary: Add a Cedar policy
      tags: [Admin API]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [id, effect]
              properties:
                id: { type: string }
                effect: { type: string, enum: [permit, forbid] }
      responses:
        '201': { description: Policy created }

  /admin/api/policies/{id}:
    delete:
      summary: Remove a Cedar policy
      tags: [Admin API]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Policy deleted }
        '404': { description: Policy not found }
  /admin/config:
    get:
      summary: Config viewer page
      tags: [Admin]
      responses:
        '200': { description: HTML config viewer }
    put:
      summary: Update configuration
      tags: [Admin]
      requestBody:
        content:
          application/x-yaml:
            schema: { type: string }
      responses:
        '200': { description: Configuration updated }
  /{path}:
    get:
      tags: [Proxy]
      summary: Proxy request to OpenSearch
      description: |
        All non-oauth4os paths are proxied to OpenSearch Engine or Dashboards.
        Paths starting with `/api/` route to Dashboards, all others to Engine.
        Bearer tokens are validated, scopes mapped to roles, and Cedar policies evaluated.
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
      security:
        - bearerAuth: []
        - {}
      responses:
        "200":
          description: Response from OpenSearch
        "401":
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient scope or Cedar policy denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: Rate limited
          headers:
            Retry-After:
              schema:
                type: integer
        "502":
          description: Upstream unavailable

  /oauth/revoke:
    post:
      tags: [OAuth]
      summary: Revoke a token (RFC 7009)
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                token:
                  type: string
                token_type_hint:
                  type: string
                  enum: [access_token, refresh_token]
      responses:
        '200':
          description: Token revoked (or already invalid)

  /oauth/consent:
    post:
      tags: [OAuth]
      summary: Approve or deny PKCE consent
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                consent_id:
                  type: string
                action:
                  type: string
                  enum: [approve, deny]
      responses:
        '302':
          description: Redirect to client with authorization code

  /health/deep:
    get:
      tags: [Operations]
      summary: Deep health check — upstream, JWKS, TLS, circuit breaker
      responses:
        '200':
          description: All subsystems healthy
          content:
            application/json:
              schema:
                type: object
        '503':
          description: One or more subsystems degraded

  /admin/apikeys:
    post:
      tags: [Admin]
      summary: Create an API key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                client_id:
                  type: string
                scopes:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: API key created

  /admin/apikeys/{client_id}:
    get:
      tags: [Admin]
      summary: List API keys for a client
      parameters:
        - name: client_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: API keys list

  /admin/apikeys/{id}:
    delete:
      tags: [Admin]
      summary: Delete an API key
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: API key deleted

  /admin/sessions:
    get:
      tags: [Admin]
      summary: List active sessions
      responses:
        '200':
          description: Active sessions

  /admin/sessions/{id}:
    delete:
      tags: [Admin]
      summary: Revoke a session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Session revoked

  /admin/sessions/logout:
    post:
      tags: [Admin]
      summary: Force logout all sessions for a client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                client_id:
                  type: string
      responses:
        '200':
          description: Sessions cleared

  /admin/audit:
    get:
      tags: [Admin]
      summary: Query audit log entries
      parameters:
        - name: client_id
          in: query
          schema:
            type: string
        - name: method
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
      responses:
        '200':
          description: Audit log entries

  /admin/audit/export:
    get:
      tags: [Admin]
      summary: Export audit logs as CSV
      parameters:
        - name: format
          in: query
          schema:
            type: string
            enum: [csv, json]
            default: csv
      responses:
        '200':
          description: Audit log export

  /admin/analytics:
    get:
      tags: [Admin]
      summary: Token analytics — top clients, scopes, indices
      responses:
        '200':
          description: Analytics data

  /admin/health:
    get:
      tags: [Admin]
      summary: Admin health dashboard — all subsystem statuses
      responses:
        '200':
          description: Subsystem health overview

  /admin/clusters:
    get:
      tags: [Admin]
      summary: List federated clusters
      responses:
        '200':
          description: Cluster list with routing info

  /install.sh:
    get:
      tags: [Demo]
      summary: CLI installer script
      responses:
        '200':
          description: Bash install script
          content:
            text/plain:
              schema:
                type: string

  /demo/app:
    get:
      tags: [Demo]
      summary: Log viewer demo web app
      responses:
        '200':
          description: HTML page
          content:
            text/html:
              schema:
                type: string

  /i18n/consent.json:
    get:
      tags: [Demo]
      summary: Consent screen translations (6 languages)
      responses:
        '200':
          description: Translation map
          content:
            application/json:
              schema:
                type: object

  /v1/traces:
    get:
      tags: [Operations]
      summary: OTLP trace export — recent spans
      responses:
        '200':
          description: Span data
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  /ready:
    get:
      tags: [System]
      summary: Readiness probe
      responses:
        '200': { description: Proxy ready to accept traffic }

  /analytics/:
    get:
      tags: [UI]
      summary: Token analytics dashboard
      responses:
        '200': { description: HTML analytics page }

  /playground/:
    get:
      tags: [UI]
      summary: Cedar policy playground
      responses:
        '200': { description: HTML playground page }

  /developer/docs:
    get:
      tags: [Developer]
      summary: API documentation page
      responses:
        '200': { description: HTML API docs }

  /developer/openapi.yaml:
    get:
      tags: [Developer]
      summary: OpenAPI specification
      responses:
        '200': { description: OpenAPI 3.0 YAML }

  /developer/analytics:
    get:
      tags: [Developer]
      summary: Developer analytics page
      responses:
        '200': { description: HTML developer analytics }

  /register/:
    get:
      tags: [UI]
      summary: Client registration form
      responses:
        '200': { description: HTML registration page }

  /admin/clients:
    get:
      tags: [UI]
      summary: Client management page
      responses:
        '200': { description: HTML client list with CRUD }

  /admin/tokens:
    get:
      tags: [UI]
      summary: Token management page
      responses:
        '200': { description: HTML token list with inspect/revoke }

  /admin/policies:
    get:
      tags: [UI]
      summary: Cedar policy editor page
      responses:
        '200': { description: HTML policy editor }

  /admin/keys:
    get:
      tags: [UI]
      summary: JWKS key viewer page
      responses:
        '200': { description: HTML JWKS viewer }

  /logs/:
    get:
      tags: [UI]
      summary: Live access log viewer
      responses:
        '200': { description: HTML terminal-style log viewer }

  /sse/metrics:
    get:
      tags: [Streaming]
      summary: Real-time metrics via Server-Sent Events
      description: Pushes JSON metrics every 1 second. Connect with EventSource.
      responses:
        '200': { description: SSE stream of metric snapshots }

  /sse/logs:
    get:
      tags: [Streaming]
      summary: Real-time access logs via Server-Sent Events
      description: Pushes JSON access log entries as they occur. Connect with EventSource.
      responses:
        '200': { description: SSE stream of access log entries }

  /explorer/:
    get:
      tags: [UI]
      summary: Interactive API request builder
      responses:
        '200': { description: HTML API explorer page }

  /dashboard/:
    get:
      tags: [UI]
      summary: Real-time admin dashboard
      responses:
        '200': { description: HTML dashboard with KPIs and charts }

  /version:
    get:
      tags: [Operations]
      summary: Proxy version info
      responses:
        '200':
          description: Version string

  /playground:
    get:
      tags: [Demo]
      summary: PKCE OAuth playground — interactive flow visualization
      responses:
        '200':
          description: HTML page

  /analytics:
    get:
      tags: [Demo]
      summary: Developer analytics dashboard
      responses:
        '200':
          description: HTML page

  /.well-known/jwks.json:
    get:
      tags: [OAuth]
      summary: JSON Web Key Set for token verification
      responses:
        '200':
          description: JWKS document

  /oauth/register/{client_id}/rotate:
    post:
      tags: [Client Management]
      summary: Rotate client secret
      parameters:
        - name: client_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: New client_id and client_secret
        '404':
          description: Client not found


components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    basicAuth:
      type: http
      scheme: basic

  schemas:
    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          example: 3600
        refresh_token:
          type: string
        scope:
          type: string

    Token:
      type: object
      properties:
        id:
          type: string
        client_id:
          type: string
        scopes:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        revoked:
          type: boolean

    Error:
      type: object
      properties:
        error:
          type: string
          example: invalid_token
        error_description:
          type: string

    Role:
      type: object
      properties:
        backend_user:
          type: string
        backend_roles:
          type: array
          items:
            type: string

    Provider:
      type: object
      properties:
        name:
          type: string
        issuer:
          type: string
          format: uri
        jwks_uri:
          type: string
          format: uri

  # --- v0.5.0 Endpoints ---

  # --- v2.0.0 Endpoints ---

  /oauth/userinfo:
    get:
      summary: OIDC UserInfo (§5.3)
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: User claims
          content:
            application/json:
              schema:
                type: object
                properties:
                  sub: { type: string }
                  scope: { type: string }
        '401':
          description: Invalid or missing token

  /admin/keys/rotate:
    post:
      summary: Trigger JWKS key rotation
      responses:
        '200':
          description: Key rotated

  /admin/api/clients/{id}/tokens:
    delete:
      summary: Revoke all tokens for a client
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '204':
          description: Tokens revoked

  /feedback:
    get:
      summary: List feedback entries
      responses:
        '200':
          description: Feedback list
    post:
      summary: Submit feedback
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                message: { type: string }
                rating: { type: integer }
      responses:
        '201':
          description: Feedback submitted

  /feedback/{id}:
    put:
      summary: Update feedback entry
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Updated

  /my-feedback:
    get:
      summary: Get current user's feedback
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: User feedback entries
