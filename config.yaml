upstream:
  engine: http://opensearch:9200
  dashboards: http://opensearch-dashboards:5601

providers:
  - name: keycloak
    issuer: https://keycloak.example.com/realms/opensearch
    jwks_uri: auto

scope_mapping:
  "read:logs-*":
    backend_user: agent-logs-reader
    backend_roles: [logs_read_access]
  "write:logs-*":
    backend_user: agent-logs-writer
    backend_roles: [logs_write_access]
  "write:dashboards":
    backend_user: agent-dashboard-writer
    backend_roles: [dashboard_write_access]
  "admin":
    backend_user: agent-admin
    backend_roles: [all_access]

listen: :8443

# Per-tenant isolation: each OIDC provider gets its own scope mapping and Cedar policies.
# Tokens from a tenant issuer use that tenant's config; others fall back to global scope_mapping.
tenants:
  "https://keycloak.example.com/realms/opensearch":
    scope_mapping:
      "read:logs-*":
        backend_user: keycloak-logs-reader
        backend_roles: [logs_read_access]
      "admin":
        backend_user: keycloak-admin
        backend_roles: [all_access]
    cedar_policies:
      - 'forbid(*, PUT, .internal*)'
      - 'forbid(*, DELETE, .internal*)'

tls:
  enabled: false
  cert_file: ""
  key_file: ""
  insecure_skip_verify: true  # for self-signed OpenSearch certs
