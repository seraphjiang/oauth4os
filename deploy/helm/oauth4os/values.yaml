replicaCount: 1

image:
  repository: ghcr.io/seraphjiang/oauth4os
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8443

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: oauth4os.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

config:
  upstream:
    engine: https://opensearch:9200
    dashboards: https://opensearch-dashboards:5601
  listen: ":8443"
  providers: []
  scope_mapping: {}

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

nodeSelector: {}
tolerations: []
affinity: {}
