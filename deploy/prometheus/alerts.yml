groups:
  - name: oauth4os
    rules:
      - alert: HighErrorRate
        expr: rate(oauth4os_requests_failed[5m]) / rate(oauth4os_requests_total[5m]) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High error rate (>5%)"
          description: "{{ $value | humanizePercentage }} of requests failing over 5m window"

      - alert: UpstreamDown
        expr: oauth4os_upstream_healthy == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Upstream OpenSearch unreachable"
          description: "Background health check reports upstream unhealthy for >1m"

      - alert: CircuitBreakerOpen
        expr: increase(oauth4os_circuit_opens[5m]) > 0
        labels:
          severity: warning
        annotations:
          summary: "Circuit breaker opened"
          description: "Upstream returned 5+ consecutive 5xx — circuit is open"

      - alert: HighAuthFailureRate
        expr: rate(oauth4os_auth_failed[5m]) / (rate(oauth4os_auth_success[5m]) + rate(oauth4os_auth_failed[5m])) > 0.2
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "High auth failure rate (>20%)"
          description: "{{ $value | humanizePercentage }} of auth attempts failing"

      - alert: RateLimitingActive
        expr: rate(oauth4os_rate_limited[5m]) > 1
        for: 5m
        labels:
          severity: info
        annotations:
          summary: "Rate limiting active"
          description: "{{ $value }} requests/s being rate limited"

      - alert: HighCedarDenials
        expr: increase(oauth4os_cedar_denied[10m]) > 50
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High Cedar policy denial rate"
          description: "{{ $value }} denials in 10m — possible misconfigured policy"

      - alert: LowCacheHitRate
        expr: rate(oauth4os_cache_hits[5m]) / (rate(oauth4os_cache_hits[5m]) + rate(oauth4os_cache_misses[5m])) < 0.3
        for: 10m
        labels:
          severity: info
        annotations:
          summary: "Low cache hit rate (<30%)"
          description: "Cache may be undersized or TTL too short"

      - alert: HighUpstreamLatency
        expr: oauth4os_upstream_latency_ms > 5000
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High upstream latency (>5s)"
          description: "Upstream health check latency: {{ $value }}ms"
