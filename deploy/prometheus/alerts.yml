groups:
  - name: oauth4os
    rules:
      - alert: HighErrorRate
        expr: rate(oauth4os_requests_failed_total[5m]) / rate(oauth4os_requests_total[5m]) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High error rate (>5%)"

      - alert: UpstreamDown
        expr: oauth4os_upstream_errors_total > 0 and rate(oauth4os_upstream_errors_total[1m]) > 0.5
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Upstream OpenSearch errors"

      - alert: AuthFailureSpike
        expr: rate(oauth4os_auth_failed_total[5m]) > 1
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Auth failure rate >1/s for 3m"

      - alert: CedarDenySpike
        expr: rate(oauth4os_cedar_denied_total[5m]) > 0.5
        for: 5m
        labels:
          severity: info
        annotations:
          summary: "Cedar policy denials elevated"

      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(oauth4os_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "p95 latency >2s"
