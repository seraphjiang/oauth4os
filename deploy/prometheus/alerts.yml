groups:
  - name: oauth4os
    rules:
      # High auth failure rate — possible brute force or misconfigured client
      - alert: HighAuthFailureRate
        expr: rate(oauth4os_auth_failed[5m]) / (rate(oauth4os_auth_success[5m]) + rate(oauth4os_auth_failed[5m])) > 0.3
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Auth failure rate above 30%"
          description: "{{ $value | humanizePercentage }} of auth attempts are failing over the last 5 minutes."

      # Upstream errors — OpenSearch may be down
      - alert: UpstreamErrorsHigh
        expr: rate(oauth4os_upstream_errors[5m]) > 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Upstream errors exceeding 1/s"
          description: "{{ $value }} upstream errors per second. Check OpenSearch connectivity."

      # Upstream unhealthy
      - alert: UpstreamUnhealthy
        expr: oauth4os_upstream_healthy == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Upstream OpenSearch is unreachable"

      # Cedar policy denials spike
      - alert: CedarDenialSpike
        expr: rate(oauth4os_cedar_denied[5m]) > 5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Cedar policy denials above 5/s"
          description: "Possible misconfigured policies or unauthorized access attempts."

      # Rate limiting active
      - alert: RateLimitingActive
        expr: rate(oauth4os_rate_limited[5m]) > 0.5
        for: 5m
        labels:
          severity: info
        annotations:
          summary: "Clients being rate limited"

      # Circuit breaker open
      - alert: CircuitBreakerOpen
        expr: oauth4os_circuit_opens > 0
        for: 10s
        labels:
          severity: critical
        annotations:
          summary: "Circuit breaker is open — upstream failures detected"

      # Load shedding active
      - alert: LoadSheddingActive
        expr: oauth4os_loadshed_inflight > 400
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Load shedding near threshold ({{ $value }}/500 inflight)"

      # Load shedding rejections
      - alert: LoadSheddingRejections
        expr: rate(oauth4os_loadshed_total[5m]) > 1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Requests being shed at {{ $value }}/s"
          description: "Server at capacity — consider scaling up."

      # High request latency
      - alert: HighUpstreamLatency
        expr: oauth4os_upstream_latency_ms > 2000
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Upstream latency above 2s"

      # Proxy down (no requests for 5 min)
      - alert: ProxyNoTraffic
        expr: rate(oauth4os_requests_total[5m]) == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "No requests received in 5 minutes"

      - alert: HighP99Latency
        expr: histogram_quantile(0.99, rate(oauth4os_request_duration_seconds_bucket[5m])) > 2
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "P99 latency exceeds 2s"
          description: "99th percentile request latency is {{ $value | humanizeDuration }}"

      - alert: HighP50Latency
        expr: histogram_quantile(0.50, rate(oauth4os_request_duration_seconds_bucket[5m])) > 0.5
        for: 5m
        labels:
          severity: info
        annotations:
          summary: "Median latency exceeds 500ms"
          description: "50th percentile request latency is {{ $value | humanizeDuration }}"
