# docker-compose.test.yml — CI integration test environment
# Usage: docker compose -f docker-compose.test.yml up -d --wait
#        go test -v -count=1 ./test/integration/...
#        docker compose -f docker-compose.test.yml down -v
services:
  opensearch:
    image: opensearchproject/opensearch:3.5.0
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms256m -Xmx256m
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30

  oauth-proxy:
    build: .
    ports:
      - "8443:8443"
    environment:
      - OAUTH4OS_UPSTREAM_ENGINE=http://opensearch:9200
      - OAUTH4OS_UPSTREAM_DASHBOARDS=http://opensearch:9200/_dashboards
      - OAUTH4OS_LISTEN=:8443
    depends_on:
      opensearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8443/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 15
