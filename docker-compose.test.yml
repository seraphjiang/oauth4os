# docker-compose.test.yml — CI integration test environment
services:
  opensearch:
    image: opensearchproject/opensearch:latest
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms256m -Xmx256m
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30

  oauth-proxy:
    build: .
    ports:
      - "8443:8443"
    volumes:
      - ./config.yaml:/etc/oauth4os/config.yaml
    depends_on:
      opensearch:
        condition: service_healthy
    environment:
      - OAUTH4OS_UPSTREAM_ENGINE=http://opensearch:9200
      - OAUTH4OS_LISTEN=:8443
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8443/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
