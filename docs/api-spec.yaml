openapi: 3.0.3
info:
  title: oauth4os — OAuth 2.0 Proxy for OpenSearch
  description: |
    OAuth 2.0 proxy that validates JWT tokens, maps scopes to OpenSearch
    security roles, and forwards requests to Engine and Dashboards.
  version: 0.2.0
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  contact:
    url: https://github.com/seraphjiang/oauth4os

servers:
  - url: http://localhost:8443
    description: Local development

tags:
  - name: Token
    description: OAuth token lifecycle
  - name: Auth
    description: PKCE and client registration
  - name: Introspection
    description: RFC 7662 token introspection
  - name: Discovery
    description: OIDC discovery
  - name: Admin
    description: Runtime configuration management
  - name: Proxy
    description: Reverse proxy to OpenSearch
  - name: Operational
    description: Health and metrics

paths:
  /oauth/token:
    post:
      tags: [Token]
      summary: Issue or refresh a token
      description: |
        Supports `client_credentials` and `refresh_token` grant types.
        Returns an access token with mapped scopes.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [grant_type]
              properties:
                grant_type:
                  type: string
                  enum: [client_credentials, refresh_token]
                client_id:
                  type: string
                  description: Client identifier
                client_secret:
                  type: string
                  description: Client secret
                scope:
                  type: string
                  description: Space-separated scopes (e.g., "read:logs-* write:dashboards")
                refresh_token:
                  type: string
                  description: Refresh token (for refresh_token grant)
      responses:
        "200":
          description: Token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Invalid client credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /oauth/token/{id}:
    get:
      tags: [Token]
      summary: Get token details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Token details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Token"
        "404":
          description: Token not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags: [Token]
      summary: Revoke a token
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Token revoked

  /oauth/tokens:
    get:
      tags: [Token]
      summary: List active tokens
      responses:
        "200":
          description: List of active (non-revoked) tokens
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Token"

  /oauth/introspect:
    post:
      tags: [Introspection]
      summary: Introspect a token (RFC 7662)
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        "200":
          description: Token introspection response
          content:
            application/json:
              schema:
                type: object
                properties:
                  active:
                    type: boolean
                  client_id:
                    type: string
                  scope:
                    type: string
                  exp:
                    type: integer
                    format: int64

  /oauth/authorize:
    get:
      tags: [Auth]
      summary: PKCE authorization endpoint
      description: Initiates authorization code flow with PKCE for browser clients.
      parameters:
        - name: client_id
          in: query
          required: true
          schema:
            type: string
        - name: code_challenge
          in: query
          required: true
          schema:
            type: string
        - name: code_challenge_method
          in: query
          schema:
            type: string
            default: S256
            enum: [S256, plain]
        - name: redirect_uri
          in: query
          required: true
          schema:
            type: string
            format: uri
        - name: scope
          in: query
          schema:
            type: string
      responses:
        "302":
          description: Redirect with authorization code
        "400":
          description: Missing required parameters

  /oauth/authorize/token:
    post:
      tags: [Auth]
      summary: Exchange authorization code for token (PKCE)
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [code, code_verifier, redirect_uri]
              properties:
                code:
                  type: string
                code_verifier:
                  type: string
                redirect_uri:
                  type: string
                  format: uri
      responses:
        "200":
          description: Token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          description: Invalid code or verifier

  /oauth/register:
    post:
      tags: [Auth]
      summary: Dynamic client registration (RFC 7591)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                client_name:
                  type: string
                scope:
                  type: string
                  description: Requested scope allowlist
                redirect_uris:
                  type: array
                  items:
                    type: string
                    format: uri
      responses:
        "201":
          description: Client registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  client_id:
                    type: string
                  client_secret:
                    type: string
                  client_name:
                    type: string

  /oauth/register/{client_id}:
    get:
      tags: [Auth]
      summary: Get registered client details
      parameters:
        - name: client_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Client details
        "404":
          description: Client not found

  /.well-known/openid-configuration:
    get:
      tags: [Discovery]
      summary: OIDC discovery document
      responses:
        "200":
          description: OpenID Connect discovery metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  issuer:
                    type: string
                  token_endpoint:
                    type: string
                  introspection_endpoint:
                    type: string
                  authorization_endpoint:
                    type: string
                  registration_endpoint:
                    type: string
                  scopes_supported:
                    type: array
                    items:
                      type: string
                  grant_types_supported:
                    type: array
                    items:
                      type: string

  /health:
    get:
      tags: [Operational]
      summary: Health check
      responses:
        "200":
          description: Proxy is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 0.2.0
                  uptime_seconds:
                    type: integer

  /metrics:
    get:
      tags: [Operational]
      summary: Prometheus metrics
      responses:
        "200":
          description: Prometheus text format metrics
          content:
            text/plain:
              schema:
                type: string

  /admin/scope-mappings:
    get:
      tags: [Admin]
      summary: List scope mappings
      responses:
        "200":
          description: Current scope-to-role mappings
    put:
      tags: [Admin]
      summary: Update scope mappings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties:
                $ref: "#/components/schemas/Role"
      responses:
        "200":
          description: Mappings updated

  /admin/providers:
    get:
      tags: [Admin]
      summary: List OIDC providers
      responses:
        "200":
          description: Configured providers
    post:
      tags: [Admin]
      summary: Add OIDC provider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Provider"
      responses:
        "201":
          description: Provider added

  /admin/providers/{name}:
    delete:
      tags: [Admin]
      summary: Remove OIDC provider
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Provider removed

  /admin/tenants:
    get:
      tags: [Admin]
      summary: List tenants
      responses:
        "200":
          description: Configured tenants

  /admin/tenants/{issuer}:
    put:
      tags: [Admin]
      summary: Update tenant configuration
      parameters:
        - name: issuer
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tenant updated
    delete:
      tags: [Admin]
      summary: Remove tenant
      parameters:
        - name: issuer
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Tenant removed

  /admin/cedar-policies:
    get:
      tags: [Admin]
      summary: List Cedar policies
      responses:
        "200":
          description: Active Cedar policies
    post:
      tags: [Admin]
      summary: Add Cedar policy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, policy]
              properties:
                id:
                  type: string
                policy:
                  type: string
                  description: Cedar policy text
      responses:
        "201":
          description: Policy added

  /admin/cedar-policies/{id}:
    delete:
      tags: [Admin]
      summary: Remove Cedar policy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Policy removed

  /admin/rate-limits:
    get:
      tags: [Admin]
      summary: List rate limit configuration
      responses:
        "200":
          description: Rate limit settings
    put:
      tags: [Admin]
      summary: Update rate limits
      responses:
        "200":
          description: Rate limits updated

  /admin/config:
    get:
      tags: [Admin]
      summary: Get full runtime configuration
      responses:
        "200":
          description: Current configuration (sensitive fields redacted)

  /{path}:
    get:
      tags: [Proxy]
      summary: Proxy request to OpenSearch
      description: |
        All non-oauth4os paths are proxied to OpenSearch Engine or Dashboards.
        Paths starting with `/api/` route to Dashboards, all others to Engine.
        Bearer tokens are validated, scopes mapped to roles, and Cedar policies evaluated.
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
      security:
        - bearerAuth: []
        - {}
      responses:
        "200":
          description: Response from OpenSearch
        "401":
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient scope or Cedar policy denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: Rate limited
          headers:
            Retry-After:
              schema:
                type: integer
        "502":
          description: Upstream unavailable

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          example: 3600
        refresh_token:
          type: string
        scope:
          type: string

    Token:
      type: object
      properties:
        id:
          type: string
        client_id:
          type: string
        scopes:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        revoked:
          type: boolean

    Error:
      type: object
      properties:
        error:
          type: string
          example: invalid_token
        error_description:
          type: string

    Role:
      type: object
      properties:
        backend_user:
          type: string
        backend_roles:
          type: array
          items:
            type: string

    Provider:
      type: object
      properties:
        name:
          type: string
        issuer:
          type: string
          format: uri
        jwks_uri:
          type: string
          format: uri
