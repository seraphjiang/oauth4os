[SERVICE]
    Flush        5
    Log_Level    info

[INPUT]
    Name         tail
    Path         /var/log/*.log
    Tag          app.*
    Read_from_Head true

[INPUT]
    Name         dummy
    Tag          demo
    Dummy        {"level":"INFO","service":"fluentbit-demo","message":"oauth4os integration test","timestamp":"2026-04-12T00:00:00Z"}
    Rate         1

[OUTPUT]
    Name            opensearch
    Match           *
    Host            oauth-proxy
    Port            8443
    Index           logs-fluentbit
    HTTP_User       ""
    HTTP_Passwd     ""
    Header          Authorization Bearer ${OAUTH4OS_TOKEN}
    Suppress_Type_Name On
    tls             Off
    Retry_Limit     3
