<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔐</text></svg>">
<meta name="description" content="oauth4os client management">
<meta name="referrer" content="strict-origin-when-cross-origin">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>oauth4os — Clients</title>
<style>
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#58a6ff;--green:#3fb950;--orange:#f0883e;--red:#f85149}
[data-theme="light"]{--bg:#f6f8fa;--surface:#fff;--border:#d0d7de;--text:#1f2328;--muted:#656d76;--accent:#0969da;--green:#1a7f37;--orange:#bc4c00;--red:#cf222e}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
a{color:var(--accent);text-decoration:none}
.container{max-width:800px;margin:0 auto;padding:20px}
header{padding:10px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.logo{font-size:16px;font-weight:700}.logo span{color:var(--accent)}
header nav{display:flex;gap:12px;align-items:center}header nav a{color:var(--muted);font-size:13px}
h1{font-size:20px;margin-bottom:4px}.sub{color:var(--muted);font-size:13px;margin-bottom:16px}
.toolbar{display:flex;gap:8px;margin-bottom:12px;align-items:center}
.btn{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer}
.btn:hover{border-color:var(--accent)}.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}.btn-danger{border-color:var(--red);color:var(--red)}
table{width:100%;border-collapse:collapse;font-size:12px}th,td{padding:8px 10px;text-align:left;border-bottom:1px solid var(--border)}th{color:var(--muted);font-weight:600}
tr:hover{background:var(--surface)}.mono{font-family:'SF Mono',Consolas,monospace;font-size:11px}
.badge{display:inline-block;padding:1px 6px;border-radius:8px;font-size:10px;background:var(--accent);color:#fff;margin:1px}
.empty{text-align:center;padding:40px;color:var(--muted)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:999}
.modal-bg.open{display:flex}.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:400px;width:90%}
.modal h3{margin-bottom:12px;font-size:15px}.modal label{display:block;font-size:12px;font-weight:600;margin:8px 0 4px}
.modal input{width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);font-size:12px}
.modal .actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.secret-box{background:var(--bg);border:2px solid var(--green);border-radius:8px;padding:12px;margin-top:12px;display:none}
.secret-box.show{display:block}.secret-box code{font-family:'SF Mono',Consolas,monospace;font-size:11px;word-break:break-all}
.warn{font-size:11px;color:var(--orange);margin-top:6px}
.theme-btn{background:none;border:1px solid var(--border);border-radius:4px;padding:2px 6px;cursor:pointer;font-size:13px;color:var(--text)}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
@media(max-width:375px){.container{padding:12px}.kv{grid-template-columns:1fr}table{font-size:10px}h1{font-size:18px}.toolbar,.controls,.filters{flex-direction:column}}
</style>
</head>
<body>
<header>
  <div class="logo">👥 <span>Clients</span></div>
  <nav><a href="../admin/">Admin</a><a href="../register/">Register</a><a href="../">← oauth4os</a><button class="theme-btn" id="themeToggle" aria-label="Toggle theme">🌓</button></nav>
</header>
<div class="container" id="main">
  <h1>OAuth Clients</h1>
  <p class="sub">Manage registered OAuth 2.0 clients</p>
  <div class="toolbar">
    <button class="btn btn-primary" onclick="openNew()" aria-label="Register new client">+ New Client</button>
    <button class="btn" onclick="load()" aria-label="Refresh">↻ Refresh</button>
    <span id="count" style="margin-left:auto;font-size:11px;color:var(--muted)"></span>
  </div>
  <div id="list"><div class="empty">Loading...</div></div>
</div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <h3 id="modalTitle">New Client</h3>
    <label for="mName">Client Name</label><input id="mName" placeholder="my-app">
    <label for="mScopes">Scopes</label><input id="mScopes" placeholder="read:logs-* write:logs-*" value="read:logs-*">
    <div class="actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="saveBtn" onclick="save()">Create</button>
    </div>
    <div class="secret-box" id="secretBox">
      <strong style="color:var(--green)">✅ Created</strong><br>
      <label>Client ID</label><code id="newId"></code> <button class="btn" onclick="cp('newId')" style="font-size:10px;padding:2px 6px">📋</button><br>
      <label>Client Secret</label><code id="newSecret"></code> <button class="btn" onclick="cp('newSecret')" style="font-size:10px;padding:2px 6px">📋</button>
      <div class="warn">⚠️ Save your client_secret now — it won't be shown again.</div>
    </div>
  </div>
</div>

<script>
const API=window.location.origin;
let clients=[];
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function cp(id){navigator.clipboard.writeText(document.getElementById(id).textContent)}

async function load(){
  try{
    const r=await fetch(API+'/oauth/register');
    const data=await r.json();
    clients=Array.isArray(data)?data:data.clients||[];
    render();
  }catch(e){document.getElementById('list').innerHTML='<div class="empty">Error: '+esc(e.message)+'</div>'}
}

function render(){
  const el=document.getElementById('list');
  document.getElementById('count').textContent=clients.length+' clients';
  if(!clients.length){el.innerHTML='<div class="empty">No clients registered. <a href="../register/">Register one →</a></div>';return}
  el.innerHTML='<table><thead><tr><th>Name</th><th>Client ID</th><th>Scopes</th><th>Actions</th></tr></thead><tbody>'+
    clients.map(c=>{
      const scopes=(c.scope||c.scopes||'').split(/\s+/).filter(Boolean).map(s=>'<span class="badge">'+esc(s)+'</span>').join(' ');
      return `<tr><td>${esc(c.client_name||c.name||'—')}</td><td class="mono">${esc(c.client_id||'')}</td><td>${scopes||'—'}</td><td><button class="btn btn-danger" onclick="del('${esc(c.client_id)}','${esc(c.client_name||c.name)}')" aria-label="Delete client">🗑 Delete</button></td></tr>`;
    }).join('')+'</tbody></table>';
}

function openNew(){
  document.getElementById('mName').value='';document.getElementById('mScopes').value='read:logs-*';
  document.getElementById('secretBox').classList.remove('show');
  document.getElementById('saveBtn').style.display='';
  document.getElementById('modal').classList.add('open');document.getElementById('mName').focus();
}
function closeModal(){document.getElementById('modal').classList.remove('open')}

async function save(){
  const name=document.getElementById('mName').value.trim();
  if(!name)return;
  const body={client_name:name};
  const scopes=document.getElementById('mScopes').value.trim();
  if(scopes)body.scope=scopes;
  try{
    const r=await fetch(API+'/oauth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(r.ok||r.status===201){
      const data=await r.json();
      document.getElementById('newId').textContent=data.client_id||'';
      document.getElementById('newSecret').textContent=data.client_secret||'';
      document.getElementById('secretBox').classList.add('show');
      document.getElementById('saveBtn').style.display='none';
      load();
    }
  }catch(e){document.getElementById('secretBox').innerHTML='<div style="color:var(--red)">Error: '+esc(e.message)+'</div>';document.getElementById('secretBox').classList.add('show')}
}

async function del(id,name){
  if(!confirm('Delete client "'+name+'"?'))return;
  await fetch(API+'/oauth/register/'+encodeURIComponent(id),{method:'DELETE'});
  load();
}

load();
document.getElementById('themeToggle').addEventListener('click',()=>{const t=document.documentElement.dataset.theme==='dark'?'light':'dark';document.documentElement.dataset.theme=t;localStorage.setItem('oauth4os_theme',t)});
if(localStorage.getItem('oauth4os_theme'))document.documentElement.dataset.theme=localStorage.getItem('oauth4os_theme');
</script>
<script src="/web/feedback.js"></script>
<script src="/web/layout.js"></script>
</body>
</html>
