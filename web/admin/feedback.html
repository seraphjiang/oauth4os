<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔐</text></svg>">
<meta name="description" content="oauth4os feedback management">
<meta name="referrer" content="strict-origin-when-cross-origin">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>oauth4os — Feedback Admin</title>
<style>
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#58a6ff;--green:#3fb950;--orange:#f0883e;--red:#f85149;--yellow:#e3b341}
[data-theme="light"]{--bg:#f6f8fa;--surface:#fff;--border:#d0d7de;--text:#1f2328;--muted:#656d76;--accent:#0969da;--green:#1a7f37;--orange:#bc4c00;--red:#cf222e;--yellow:#9a6700}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
a{color:var(--accent);text-decoration:none}.container{max-width:800px;margin:0 auto;padding:20px}
header{padding:10px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.logo{font-size:16px;font-weight:700}.logo span{color:var(--accent)}
header nav{display:flex;gap:12px;align-items:center}header nav a{color:var(--muted);font-size:13px}
h1{font-size:20px;margin-bottom:4px}.sub{color:var(--muted);font-size:13px;margin-bottom:16px}
.item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:10px}
.item h3{font-size:14px;margin-bottom:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.meta{font-size:11px;color:var(--muted);margin-bottom:6px}
.desc{font-size:12px;margin-bottom:8px}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.s-pending{background:#e3b34120;color:var(--yellow)}.s-reviewed{background:#58a6ff20;color:var(--accent)}
.s-replied{background:#3fb95020;color:var(--green)}.s-closed{background:#8b949e20;color:var(--muted)}
.type-bug{color:var(--red)}.type-feature{color:var(--accent)}.type-general{color:var(--green)}
.reply-box{margin-top:8px;padding:10px;background:var(--bg);border:1px solid var(--border);border-radius:6px}
.reply-box textarea{width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:4px;background:var(--surface);color:var(--text);font-size:12px;font-family:inherit;height:60px;resize:vertical;margin-bottom:6px}
.reply-box select{padding:4px 8px;border:1px solid var(--border);border-radius:4px;background:var(--surface);color:var(--text);font-size:11px;margin-right:6px}
.btn{padding:4px 12px;border-radius:4px;font-size:11px;font-weight:600;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer}
.btn:hover{border-color:var(--accent)}.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.admin-reply{margin-top:6px;padding:8px;background:#3fb95010;border-left:3px solid var(--green);border-radius:4px;font-size:12px}
.empty{text-align:center;padding:40px;color:var(--muted)}
.filters{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.filters select{padding:4px 8px;border:1px solid var(--border);border-radius:4px;background:var(--bg);color:var(--text);font-size:11px}
.theme-btn{background:none;border:1px solid var(--border);border-radius:4px;padding:2px 6px;cursor:pointer;font-size:13px;color:var(--text)}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
@media(max-width:375px){.container{padding:12px}.kv{grid-template-columns:1fr}table{font-size:10px}h1{font-size:18px}.toolbar,.controls,.filters{flex-direction:column}}
</style>
</head>
<body>
<header>
  <div class="logo">💬 <span>Feedback</span></div>
  <nav><a href="./">Admin</a><a href="/dashboard/">Dashboard</a><a href="../">← oauth4os</a><button class="theme-btn" id="themeToggle" aria-label="Toggle theme">🌓</button></nav>
</header>
<div class="container">
  <h1>Feedback Management</h1>
  <p class="sub">Review, reply, and manage user feedback</p>
  <div class="filters">
    <label style="font-size:11px">Status: <select id="fStatus" aria-label="Filter by status"><option value="">All</option><option value="pending">Pending</option><option value="reviewed">Reviewed</option><option value="replied">Replied</option><option value="closed">Closed</option></select></label>
    <label style="font-size:11px">Type: <select id="fType" aria-label="Filter by type"><option value="">All</option><option value="bug">Bug</option><option value="feature">Feature</option><option value="general">General</option></select></label>
    <span id="count" style="margin-left:auto;font-size:11px;color:var(--muted)"></span>
  </div>
  <div id="list"><div class="empty">Loading...</div></div>
</div>
<script>
const API=window.location.origin;
let items=[];
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}

async function load(){
  try{
    const r=await fetch(API+'/feedback');
    items=(await r.json())||[];
    render();
  }catch(e){document.getElementById('list').innerHTML='<div class="empty">Error: '+esc(e.message)+'</div>'}
}

function render(){
  const st=document.getElementById('fStatus').value;
  const ty=document.getElementById('fType').value;
  let f=items;
  if(st)f=f.filter(i=>i.status===st);
  if(ty)f=f.filter(i=>i.type===ty);
  document.getElementById('count').textContent=f.length+' of '+items.length;
  if(!f.length){document.getElementById('list').innerHTML='<div class="empty">No feedback'+(st||ty?' matching filters':'')+'</div>';return}
  document.getElementById('list').innerHTML=f.slice().reverse().map(i=>`
    <div class="item" id="item-${esc(i.id)}">
      <h3>
        <span class="type-${esc(i.type)}">${esc(i.type==='bug'?'🐛':i.type==='feature'?'✨':'💡')}</span>
        ${esc(i.title)}
        <span class="badge s-${esc(i.status)}">${esc(i.status)}</span>
      </h3>
      <div class="meta">${esc(i.id)} · ${esc(i.submitter||'anonymous')} · ${esc(i.created_at||'')}</div>
      ${i.description?'<div class="desc">'+esc(i.description)+'</div>':''}
      ${i.admin_reply?'<div class="admin-reply"><strong>Admin:</strong> '+esc(i.admin_reply)+'</div>':''}
      <div class="reply-box">
        <textarea id="reply-${esc(i.id)}" placeholder="Write a reply...">${esc(i.admin_reply||'')}</textarea>
        <select id="status-${esc(i.id)}">
          <option value="pending" ${i.status==='pending'?'selected':''}>Pending</option>
          <option value="reviewed" ${i.status==='reviewed'?'selected':''}>Reviewed</option>
          <option value="replied" ${i.status==='replied'?'selected':''}>Replied</option>
          <option value="closed" ${i.status==='closed'?'selected':''}>Closed</option>
        </select>
        <button class="btn btn-primary" onclick="update('${esc(i.id)}')">Save</button>
      </div>
    </div>`).join('');
}

async function update(id){
  const reply=document.getElementById('reply-'+id).value;
  const status=document.getElementById('status-'+id).value;
  await fetch(API+'/feedback/'+encodeURIComponent(id),{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({status,admin_reply:reply})});
  load();
}

document.getElementById('fStatus').addEventListener('change',render);
document.getElementById('fType').addEventListener('change',render);
load();
document.getElementById('themeToggle').addEventListener('click',()=>{const t=document.documentElement.dataset.theme==='dark'?'light':'dark';document.documentElement.dataset.theme=t;localStorage.setItem('oauth4os_theme',t)});
if(localStorage.getItem('oauth4os_theme'))document.documentElement.dataset.theme=localStorage.getItem('oauth4os_theme');
</script>
<script src="/web/layout.js"></script>
</body>
</html>
