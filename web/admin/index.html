<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>oauth4os — Admin Console</title>
<style>
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#58a6ff;--green:#3fb950;--orange:#f0883e;--purple:#bc8cff;--red:#f85149}
[data-theme="light"]{--bg:#f6f8fa;--surface:#fff;--border:#d0d7de;--text:#1f2328;--muted:#656d76;--accent:#0969da;--green:#1a7f37;--orange:#bc4c00;--purple:#8250df;--red:#cf222e}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
a{color:var(--accent);text-decoration:none}
code{background:var(--bg);padding:2px 6px;border-radius:4px;font-size:12px;font-family:'SF Mono',Consolas,monospace}

.app{display:flex;min-height:100vh}
.sidebar{width:200px;background:var(--surface);border-right:1px solid var(--border);padding:16px}
.sidebar .brand{font-size:16px;font-weight:700;margin-bottom:20px}.brand span{color:var(--accent)}
.sidebar nav a{display:block;padding:6px 10px;border-radius:6px;color:var(--muted);font-size:13px;margin-bottom:2px;cursor:pointer}
.sidebar nav a:hover,.sidebar nav a.active{background:var(--bg);color:var(--text)}
.main{flex:1;padding:20px;overflow-y:auto}
h2{font-size:18px;margin-bottom:16px}

.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:12px}
.card h3{font-size:14px;margin-bottom:8px}
.kv{display:grid;grid-template-columns:140px 1fr;gap:4px 12px;font-size:12px}
.kv .k{color:var(--muted)}.kv .v{font-family:'SF Mono',Consolas,monospace;word-break:break-all}
table{width:100%;border-collapse:collapse;font-size:12px}
th,td{padding:6px 8px;text-align:left;border-bottom:1px solid var(--border)}
th{color:var(--muted);font-size:10px;text-transform:uppercase;font-weight:600}
.badge{padding:1px 8px;border-radius:10px;font-size:10px;font-weight:600}
.badge-ok{background:#3fb95022;color:var(--green)}
.badge-warn{background:#f0883e22;color:var(--orange)}
.badge-err{background:#f8514922;color:var(--red)}
.btn{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer}
.btn:hover{border-color:var(--accent)}
.btn-danger{color:var(--red);border-color:var(--red)}
.btn-danger:hover{background:var(--red);color:#fff}
.btn-sm{padding:3px 8px;font-size:10px}
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.theme-btn{position:fixed;top:12px;right:12px;background:none;border:1px solid var(--border);border-radius:4px;padding:2px 6px;cursor:pointer;font-size:13px;color:var(--text);z-index:10}
.empty{text-align:center;padding:40px;color:var(--muted)}
.skeleton{background:linear-gradient(90deg,var(--surface) 25%,var(--border) 50%,var(--surface) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px;height:14px;margin-bottom:6px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@media(max-width:768px){.sidebar{display:none}.main{padding:12px}}
@media(max-width:375px){.kv{grid-template-columns:1fr}table{font-size:10px}}
</style>
</head>
<body>
<button class="theme-btn" id="themeToggle" aria-label="Toggle theme">🌓</button>
<div class="app">
  <div class="sidebar">
    <div class="brand">⚙️ Admin <span>Console</span></div>
    <nav>
      <a class="active" data-tab="health">🟢 Health</a>
      <a data-tab="sessions">👥 Sessions</a>
      <a data-tab="audit">📋 Audit Log</a>
      <a data-tab="clusters">🌐 Clusters</a>
      <a data-tab="apikeys">🔑 API Keys</a>
      <a data-tab="webhooks">🔔 Webhooks</a>
      <a data-tab="ratelimits">⚡ Rate Limits</a>
      <a data-tab="config">📝 Config</a>
    </nav>
    <div style="margin-top:auto;padding-top:16px;border-top:1px solid var(--border);font-size:11px;color:var(--muted)">
      <a href="../">← oauth4os</a><br>
      <a href="../demo/">Demo App</a>
    </div>
  </div>
  <div class="main" id="content"></div>
</div>
<script>
const API = window.location.origin;
let tab = 'health';

// Nav
document.querySelectorAll('[data-tab]').forEach(a => {
  a.addEventListener('click', () => {
    document.querySelectorAll('[data-tab]').forEach(n => n.classList.remove('active'));
    a.classList.add('active');
    tab = a.dataset.tab;
    loadTab();
  });
});

async function api(path) {
  try {
    const r = await fetch(API + path);
    return r.ok ? await r.json() : null;
  } catch { return null; }
}

async function loadTab() {
  const el = document.getElementById('content');
  el.innerHTML = Array(3).fill('<div class="card"><div class="skeleton"></div><div class="skeleton" style="width:60%"></div></div>').join('');

  switch (tab) {
    case 'health': await renderHealth(el); break;
    case 'sessions': await renderSessions(el); break;
    case 'audit': await renderAudit(el); break;
    case 'clusters': await renderClusters(el); break;
    case 'apikeys': await renderApiKeys(el); break;
    case 'webhooks': await renderWebhooks(el); break;
    case 'ratelimits': await renderRateLimits(el); break;
    case 'config': await renderConfig(el); break;
  }
}

async function renderHealth(el) {
  const [health, metrics] = await Promise.all([api('/health'), api('/admin/health')]);
  const h = health || {};
  const deep = metrics || {};
  el.innerHTML = `<h2>System Health</h2>
    <div class="card"><h3>Proxy Status</h3><div class="kv">
      <div class="k">Status</div><div class="v"><span class="badge ${h.status === 'ok' ? 'badge-ok' : 'badge-err'}">${h.status || 'unknown'}</span></div>
      <div class="k">Version</div><div class="v">${esc(h.version || '—')}</div>
      <div class="k">Uptime</div><div class="v">${esc(h.uptime || '—')}</div>
      <div class="k">Go Version</div><div class="v">${esc(h.go_version || '—')}</div>
    </div></div>
    <div class="card"><h3>Deep Health</h3><div class="kv">
      <div class="k">Upstream</div><div class="v"><span class="badge ${deep.upstream === 'ok' ? 'badge-ok' : 'badge-err'}">${esc(deep.upstream || '—')}</span></div>
      <div class="k">JWKS</div><div class="v"><span class="badge ${deep.jwks === 'ok' ? 'badge-ok' : 'badge-warn'}">${esc(deep.jwks || '—')}</span></div>
      <div class="k">Clients</div><div class="v">${deep.clients ?? '—'}</div>
      <div class="k">Active Tokens</div><div class="v">${deep.active_tokens ?? '—'}</div>
    </div></div>`;
}

async function renderSessions(el) {
  const sessions = await api('/admin/sessions') || [];
  el.innerHTML = `<div class="toolbar"><h2>Active Sessions</h2><button class="btn btn-danger btn-sm" id="logoutAll" aria-label="Logout all sessions">Logout All</button></div>`;
  if (!sessions.length && !Array.isArray(sessions)) {
    el.innerHTML += '<div class="empty">No active sessions</div>'; return;
  }
  const rows = (Array.isArray(sessions) ? sessions : Object.values(sessions));
  el.innerHTML += `<div class="card"><table><thead><tr><th>Client</th><th>Scope</th><th>Created</th><th>Action</th></tr></thead><tbody>
    ${rows.map(s => `<tr><td>${esc(s.client_id || s.sub || '—')}</td><td><code>${esc(s.scope || '—')}</code></td><td>${esc(s.created_at || s.iat || '—')}</td>
      <td><button class="btn btn-danger btn-sm" aria-label="Revoke session" onclick="revokeSession('${esc(s.id || s.session_id || '')}')">Revoke</button></td></tr>`).join('')}
  </tbody></table></div>`;
  document.getElementById('logoutAll')?.addEventListener('click', async () => {
    await fetch(API + '/admin/sessions/logout', { method: 'POST' });
    loadTab();
  });
}

async function revokeSession(id) {
  if (!id) return;
  await fetch(API + '/admin/sessions/' + id, { method: 'DELETE' });
  loadTab();
}

async function renderAudit(el) {
  const audit = await api('/admin/audit') || [];
  el.innerHTML = `<div class="toolbar"><h2>Audit Log</h2><a href="${API}/admin/audit/export?format=csv" class="btn btn-sm">📥 Export CSV</a></div>`;
  const rows = Array.isArray(audit) ? audit : audit.entries || [];
  if (!rows.length) { el.innerHTML += '<div class="empty">No audit entries</div>'; return; }
  el.innerHTML += `<div class="card"><table><thead><tr><th>Time</th><th>Action</th><th>Client</th><th>Detail</th></tr></thead><tbody>
    ${rows.slice(0, 50).map(a => `<tr><td style="white-space:nowrap;font-size:11px">${esc(a.timestamp || a.time || '—')}</td>
      <td><span class="badge ${a.action?.includes('revoke') || a.action?.includes('delete') ? 'badge-err' : 'badge-ok'}">${esc(a.action || a.event || '—')}</span></td>
      <td>${esc(a.client_id || a.sub || '—')}</td>
      <td style="font-size:11px;color:var(--muted)">${esc(a.detail || a.path || '—')}</td></tr>`).join('')}
  </tbody></table></div>`;
}

async function renderClusters(el) {
  const clusters = await api('/admin/clusters') || [];
  el.innerHTML = '<h2>Upstream Clusters</h2>';
  const items = Array.isArray(clusters) ? clusters : [clusters];
  if (!items.length || !items[0]) { el.innerHTML += '<div class="empty">No clusters configured</div>'; return; }
  items.forEach(c => {
    el.innerHTML += `<div class="card"><h3>${esc(c.name || c.url || 'Primary')}</h3><div class="kv">
      <div class="k">URL</div><div class="v">${esc(c.url || c.endpoint || '—')}</div>
      <div class="k">Status</div><div class="v"><span class="badge ${c.status === 'ok' || c.healthy ? 'badge-ok' : 'badge-err'}">${esc(c.status || (c.healthy ? 'ok' : 'unknown'))}</span></div>
      <div class="k">Auth</div><div class="v">${esc(c.auth || c.auth_method || 'SigV4')}</div>
      <div class="k">Region</div><div class="v">${esc(c.region || '—')}</div>
    </div></div>`;
  });
}

async function renderApiKeys(el) {
  const keys = await api('/admin/apikeys') || [];
  el.innerHTML = '<div class="toolbar"><h2>API Keys</h2></div>';
  const rows = Array.isArray(keys) ? keys : Object.values(keys);
  if (!rows.length) { el.innerHTML += '<div class="empty">No API keys</div>'; return; }
  el.innerHTML += `<div class="card"><table><thead><tr><th>ID</th><th>Client</th><th>Scopes</th><th>Created</th><th>Action</th></tr></thead><tbody>
    ${rows.map(k => `<tr><td><code>${esc((k.id || '').slice(0, 12))}...</code></td><td>${esc(k.client_id || '—')}</td>
      <td><code>${esc(k.scope || k.scopes || '—')}</code></td><td>${esc(k.created_at || '—')}</td>
      <td><button class="btn btn-danger btn-sm" aria-label="Delete API key" onclick="deleteKey('${esc(k.id || '')}')">Delete</button></td></tr>`).join('')}
  </tbody></table></div>`;
}

async function deleteKey(id) {
  if (!id) return;
  await fetch(API + '/admin/apikeys/' + id, { method: 'DELETE' });
  loadTab();
}

async function renderConfig(el) {
  let configText = '';
  try {
    const r = await fetch(API + '/admin/config');
    if (r.ok) configText = await r.text();
  } catch {}
  if (!configText) configText = '# Config not available via API.\n# Edit config.yaml on the server and restart.\n\n# Example:\nupstream:\n  engine: https://your-opensearch:9200\n  sigv4:\n    region: us-west-2\n    service: aoss\n\nproviders:\n  - name: keycloak\n    issuer: https://keycloak.example.com/realms/opensearch\n    jwks_uri: auto\n\nscope_mapping:\n  "read:logs-*":\n    backend_roles: [logs_read_access]\n  "admin":\n    backend_roles: [all_access]\n\nlisten: :8443\n\nrate_limits:\n  "read:logs-*": 600\n  "write:logs-*": 120';

  el.innerHTML = `<h2>Configuration</h2>
    <div class="card">
      <h3>config.yaml</h3>
      <textarea id="configEditor" style="width:100%;min-height:400px;padding:12px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);font-family:'SF Mono',Consolas,monospace;font-size:12px;line-height:1.5;resize:vertical;tab-size:2" spellcheck="false" aria-label="Configuration editor">${esc(configText)}</textarea>
      <div style="display:flex;gap:8px;margin-top:12px;align-items:center">
        <button class="btn" aria-label="Validate config" onclick="validateConfig()">✅ Validate</button>
        <button class="btn" aria-label="Copy config" onclick="copyConfig()">📋 Copy</button>
        <button class="btn" aria-label="Download config" onclick="downloadConfig()">💾 Download</button>
        <span id="configStatus" style="font-size:12px;margin-left:auto"></span>
      </div>
    </div>
    <div class="card"><h3>Config Reference</h3><div class="kv">
      <div class="k">upstream.engine</div><div class="v">OpenSearch endpoint URL</div>
      <div class="k">upstream.sigv4</div><div class="v">AWS SigV4 signing (region, service)</div>
      <div class="k">providers[]</div><div class="v">OIDC providers (name, issuer, jwks_uri)</div>
      <div class="k">scope_mapping</div><div class="v">Scope → backend_roles mapping</div>
      <div class="k">listen</div><div class="v">Proxy listen address (default :8443)</div>
      <div class="k">rate_limits</div><div class="v">Per-scope rate limits (requests/min)</div>
      <div class="k">webhook_urls</div><div class="v">Event notification endpoints</div>
      <div class="k">tracing.otlp_endpoint</div><div class="v">OpenTelemetry collector URL</div>
      <div class="k">cedar.policy_file</div><div class="v">Path to Cedar policy file</div>
    </div></div>`;
}

function validateConfig() {
  const text = document.getElementById('configEditor').value;
  const status = document.getElementById('configStatus');
  const lines = text.split('\n');
  let errors = [];
  lines.forEach((l, i) => {
    if (l.includes('\t')) errors.push(`Line ${i + 1}: tabs not allowed (use spaces)`);
    if (l.match(/^\s+\S/) && !l.match(/^\s*[-#]/)) {
      const indent = l.match(/^(\s*)/)[1].length;
      if (indent % 2 !== 0) errors.push(`Line ${i + 1}: odd indentation (use 2 spaces)`);
    }
  });
  if (!text.includes('upstream:')) errors.push('Missing required: upstream');
  if (!text.includes('listen:')) errors.push('Missing required: listen');
  status.innerHTML = errors.length ? `<span style="color:var(--red)">❌ ${errors.length} issue(s): ${esc(errors[0])}</span>` : '<span style="color:var(--green)">✅ Config looks valid</span>';
}

function copyConfig() {
  navigator.clipboard.writeText(document.getElementById('configEditor').value);
  document.getElementById('configStatus').innerHTML = '<span style="color:var(--green)">📋 Copied</span>';
}

function downloadConfig() {
  const blob = new Blob([document.getElementById('configEditor').value], { type: 'text/yaml' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'config.yaml';
  a.click();
}

async function renderRateLimits(el) {
  const metrics = await fetch(API + '/metrics').then(r => r.text()).catch(() => '');
  const lines = metrics.split('\n').filter(l => l && !l.startsWith('#'));
  const rlMetrics = lines.filter(l => l.includes('ratelimit') || l.includes('rate_limit'));
  const total = lines.find(l => l.startsWith('oauth4os_requests_total'))?.split(' ')[1] || '—';
  const limited = lines.find(l => l.includes('rate_limited'))?.split(' ')[1] || '0';

  el.innerHTML = `<h2>Rate Limits</h2>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px">
      <div class="card" style="text-align:center"><div style="font-size:24px;font-weight:800">${esc(total)}</div><div style="font-size:11px;color:var(--muted)">TOTAL REQUESTS</div></div>
      <div class="card" style="text-align:center"><div style="font-size:24px;font-weight:800;color:var(--orange)">${esc(limited)}</div><div style="font-size:11px;color:var(--muted)">RATE LIMITED (429)</div></div>
      <div class="card" style="text-align:center"><div style="font-size:24px;font-weight:800;color:var(--green)">${total !== '—' ? ((1 - parseInt(limited) / Math.max(1, parseInt(total))) * 100).toFixed(1) + '%' : '—'}</div><div style="font-size:11px;color:var(--muted)">SUCCESS RATE</div></div>
    </div>
    <div class="card"><h3>Configuration</h3><div class="kv">
      <div class="k">Strategy</div><div class="v">Token bucket per client_id / API key</div>
      <div class="k">Default Rate</div><div class="v">100 requests/minute</div>
      <div class="k">Scope Overrides</div><div class="v"><code>admin:*</code> → 200/min, <code>read:*</code> → 100/min</div>
      <div class="k">Headers</div><div class="v"><code>X-RateLimit-Limit</code>, <code>X-RateLimit-Remaining</code>, <code>X-RateLimit-Reset</code></div>
      <div class="k">Exceeded</div><div class="v">429 Too Many Requests + <code>Retry-After</code> header</div>
    </div></div>
    <div class="card"><h3>Per-Client Metrics</h3>
      ${rlMetrics.length ? `<table><thead><tr><th>Metric</th><th>Value</th></tr></thead><tbody>
        ${rlMetrics.map(l => { const [k, v] = l.split(' '); return `<tr><td><code>${esc(k)}</code></td><td>${esc(v)}</td></tr>`; }).join('')}
      </tbody></table>` : '<div style="color:var(--muted);font-size:12px">No rate limit metrics yet — make some requests to populate.</div>'}
    </div>
    <div class="card"><h3>Test Rate Limit</h3>
      <p style="font-size:12px;color:var(--muted);margin-bottom:8px">Send rapid requests to see rate limiting in action:</p>
      <button class="btn btn-sm" aria-label="Test rate limit" onclick="testRateLimit()">⚡ Send 10 rapid requests</button>
      <div id="rlResult" style="margin-top:8px;font-size:12px"></div>
    </div>`;
}

async function testRateLimit() {
  const el = document.getElementById('rlResult');
  el.innerHTML = '⏳ Sending...';
  let ok = 0, limited = 0;
  const promises = Array(10).fill(0).map(() =>
    fetch(API + '/health').then(r => { if (r.status === 429) limited++; else ok++; }).catch(() => limited++)
  );
  await Promise.all(promises);
  el.innerHTML = `✅ ${ok} succeeded, 🚫 ${limited} rate-limited (429)`;
}

async function renderWebhooks(el) {
  const events = ['token.issued','token.revoked','token.refreshed','client.registered','client.deleted'];
  el.innerHTML = `<div class="toolbar"><h2>Webhook Notifications</h2></div>
    <div class="card"><h3>Event Types</h3>
      <table><thead><tr><th>Event</th><th>Description</th><th>Test</th></tr></thead><tbody>
        ${events.map(e => `<tr><td><code>${esc(e)}</code></td>
          <td style="color:var(--muted);font-size:11px">${esc(eventDesc(e))}</td>
          <td><button class="btn btn-sm" aria-label="Test ${e} webhook" onclick="testWebhook('${e}')">⚡ Test</button></td></tr>`).join('')}
      </tbody></table>
    </div>
    <div class="card"><h3>Payload Format</h3>
      <pre style="background:var(--bg);padding:12px;border-radius:6px;font-size:11px;overflow-x:auto">{
  "type": "token.issued",
  "client_id": "my-service",
  "scopes": ["read:logs-*"],
  "timestamp": "${new Date().toISOString()}",
  "request_id": "abc123"
}</pre>
    </div>
    <div class="card"><h3>Configuration</h3>
      <div class="kv">
        <div class="k">Config Key</div><div class="v"><code>webhook_urls</code> in config.yaml</div>
        <div class="k">Method</div><div class="v">POST</div>
        <div class="k">Content-Type</div><div class="v">application/json</div>
        <div class="k">Timeout</div><div class="v">5 seconds</div>
        <div class="k">Delivery</div><div class="v">Async (buffered channel, 100 capacity)</div>
        <div class="k">Retry</div><div class="v">None (fire-and-forget)</div>
      </div>
    </div>
    <div id="webhookResult"></div>`;
}

function eventDesc(e) {
  const m = {'token.issued':'Fired when a new access token is created','token.revoked':'Fired when a token is revoked','token.refreshed':'Fired when a token is refreshed','client.registered':'Fired when a new OAuth client registers','client.deleted':'Fired when a client is deleted'};
  return m[e] || e;
}

async function testWebhook(eventType) {
  const el = document.getElementById('webhookResult');
  el.innerHTML = '<div class="card" style="border-color:var(--accent)"><h3>⏳ Sending test event...</h3></div>';
  const payload = { type: eventType, client_id: 'test-webhook', scopes: ['read:logs-*'], timestamp: new Date().toISOString(), request_id: 'test-' + Date.now().toString(36) };
  el.innerHTML = `<div class="card" style="border-color:var(--green)"><h3>✅ Test Event Payload</h3>
    <pre style="background:var(--bg);padding:12px;border-radius:6px;font-size:11px;overflow-x:auto">${esc(JSON.stringify(payload, null, 2))}</pre>
    <div style="font-size:11px;color:var(--muted);margin-top:8px">Event would be delivered to all configured webhook_urls. Configure URLs in config.yaml to receive events.</div></div>`;
}

function esc(s) { const d = document.createElement('div'); d.textContent = s ?? ''; return d.innerHTML; }

// Theme
document.getElementById('themeToggle').addEventListener('click', () => {
  const t = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = t;
  localStorage.setItem('oauth4os_theme', t);
});
const saved = localStorage.getItem('oauth4os_theme');
if (saved) document.documentElement.dataset.theme = saved;

loadTab();
setInterval(loadTab, 30000);
</script>
</body>
</html>
