<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔐</text></svg>">
<meta name="description" content="oauth4os tenant management">
<meta name="referrer" content="strict-origin-when-cross-origin">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>oauth4os — Tenants</title>
<style>
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#58a6ff;--green:#3fb950;--orange:#f0883e;--red:#f85149}
[data-theme="light"]{--bg:#f6f8fa;--surface:#fff;--border:#d0d7de;--text:#1f2328;--muted:#656d76;--accent:#0969da;--green:#1a7f37;--orange:#bc4c00;--red:#cf222e}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
a{color:var(--accent);text-decoration:none}.container{max-width:800px;margin:0 auto;padding:20px}
header{padding:10px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.logo{font-size:16px;font-weight:700}.logo span{color:var(--accent)}
header nav{display:flex;gap:12px;align-items:center}header nav a{color:var(--muted);font-size:13px}
h1{font-size:20px;margin-bottom:4px}.sub{color:var(--muted);font-size:13px;margin-bottom:16px}
.btn{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer}
.btn:hover{border-color:var(--accent)}.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}.btn-danger{border-color:var(--red);color:var(--red)}
.toolbar{display:flex;gap:8px;margin-bottom:12px;align-items:center}
.tenant{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:10px}
.tenant h3{font-size:14px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.kv{display:grid;grid-template-columns:120px 1fr;gap:4px 12px;font-size:12px}
.kv .k{color:var(--muted);font-weight:600}.kv .v{font-family:'SF Mono',Consolas,monospace;font-size:11px;word-break:break-all}
.badge{display:inline-block;padding:1px 6px;border-radius:8px;font-size:10px;background:var(--green);color:#fff;margin-left:6px}
.empty{text-align:center;padding:40px;color:var(--muted)}
.theme-btn{background:none;border:1px solid var(--border);border-radius:4px;padding:2px 6px;cursor:pointer;font-size:13px;color:var(--text)}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
@media(max-width:375px){.kv{grid-template-columns:1fr}.toolbar{flex-direction:column}}
</style>
</head>
<body>
<header>
  <div class="logo">🏢 <span>Tenants</span></div>
  <nav><a href="clients.html">Clients</a><a href="tokens.html">Tokens</a><a href="policies.html">Policies</a><a href="./">Admin</a><a href="../">← oauth4os</a><button class="theme-btn" id="themeToggle" aria-label="Toggle theme">🌓</button></nav>
</header>
<div class="container" id="main">
  <h1>Tenant Management</h1>
  <p class="sub">Multi-tenant identity provider configuration</p>
  <div class="toolbar">
    <button class="btn" onclick="load()" aria-label="Refresh">↻ Refresh</button>
    <span id="count" style="margin-left:auto;font-size:11px;color:var(--muted)"></span>
  </div>
  <div id="list"><div class="empty">Loading...</div></div>
</div>
<script>
const API=window.location.origin;
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}

async function load(){
  try{
    const r=await fetch(API+'/admin/tenants');
    const data=await r.json();
    // Could be object (map) or array
    let tenants=[];
    if(Array.isArray(data))tenants=data;
    else if(typeof data==='object')tenants=Object.entries(data).map(([k,v])=>({issuer:k,...v}));
    render(tenants);
  }catch(e){document.getElementById('list').innerHTML='<div class="empty">Error: '+esc(e.message)+'</div>'}
}

function render(tenants){
  document.getElementById('count').textContent=tenants.length+' tenants';
  if(!tenants.length){document.getElementById('list').innerHTML='<div class="empty">No tenants configured. Add providers in config.yaml.</div>';return}
  document.getElementById('list').innerHTML=tenants.map(t=>`
    <div class="tenant">
      <h3>${esc(t.name||t.issuer||'unnamed')}<span class="badge">${esc(t.type||'oidc')}</span></h3>
      <div class="kv">
        <div class="k">Issuer</div><div class="v">${esc(t.issuer||'—')}</div>
        <div class="k">JWKS URI</div><div class="v">${esc(t.jwks_uri||t.jwksUri||'auto')}</div>
        <div class="k">Client ID</div><div class="v">${esc(t.client_id||t.clientId||'—')}</div>
        <div class="k">Scopes</div><div class="v">${esc(t.scopes||t.scope||'—')}</div>
        <div class="k">Audience</div><div class="v">${esc(t.audience||'—')}</div>
      </div>
    </div>`).join('');
}

load();
document.getElementById('themeToggle').addEventListener('click',()=>{const t=document.documentElement.dataset.theme==='dark'?'light':'dark';document.documentElement.dataset.theme=t;localStorage.setItem('oauth4os_theme',t)});
if(localStorage.getItem('oauth4os_theme'))document.documentElement.dataset.theme=localStorage.getItem('oauth4os_theme');
</script>
<script src="/web/feedback.js"></script>
<script src="/web/layout.js"></script>
</body>
</html>
