<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔐</text></svg>">
<meta name="description" content="oauth4os active token management">
<meta name="referrer" content="strict-origin-when-cross-origin">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>oauth4os — Tokens</title>
<style>
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#58a6ff;--green:#3fb950;--orange:#f0883e;--red:#f85149}
[data-theme="light"]{--bg:#f6f8fa;--surface:#fff;--border:#d0d7de;--text:#1f2328;--muted:#656d76;--accent:#0969da;--green:#1a7f37;--orange:#bc4c00;--red:#cf222e}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
a{color:var(--accent);text-decoration:none}
.container{max-width:900px;margin:0 auto;padding:20px}
header{padding:10px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.logo{font-size:16px;font-weight:700}.logo span{color:var(--accent)}
header nav{display:flex;gap:12px;align-items:center}header nav a{color:var(--muted);font-size:13px}
h1{font-size:20px;margin-bottom:4px}.sub{color:var(--muted);font-size:13px;margin-bottom:16px}
.toolbar{display:flex;gap:8px;margin-bottom:12px;align-items:center}
.btn{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer}
.btn:hover{border-color:var(--accent)}.btn-danger{border-color:var(--red);color:var(--red)}
table{width:100%;border-collapse:collapse;font-size:12px}th,td{padding:8px 10px;text-align:left;border-bottom:1px solid var(--border)}th{color:var(--muted);font-weight:600}
tr:hover{background:var(--surface)}.mono{font-family:'SF Mono',Consolas,monospace;font-size:11px}
.active{color:var(--green)}.expired{color:var(--red)}
.empty{text-align:center;padding:40px;color:var(--muted)}
.inspect{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;margin-top:8px;font-size:11px;font-family:'SF Mono',Consolas,monospace;white-space:pre-wrap;display:none}
.theme-btn{background:none;border:1px solid var(--border);border-radius:4px;padding:2px 6px;cursor:pointer;font-size:13px;color:var(--text)}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
</style>
</head>
<body>
<header>
  <div class="logo">🔑 <span>Tokens</span></div>
  <nav><a href="clients.html">Clients</a><a href="./">Admin</a><a href="../">← oauth4os</a><button class="theme-btn" id="themeToggle" aria-label="Toggle theme">🌓</button></nav>
</header>
<div class="container" id="main">
  <h1>Active Tokens</h1>
  <p class="sub">View and revoke OAuth 2.0 tokens</p>
  <div class="toolbar">
    <button class="btn" onclick="load()" aria-label="Refresh">↻ Refresh</button>
    <span id="count" style="margin-left:auto;font-size:11px;color:var(--muted)"></span>
  </div>
  <div id="list"><div class="empty">Loading...</div></div>
  <div class="inspect" id="inspect"></div>
</div>
<script>
const API=window.location.origin;
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}

async function load(){
  try{
    const r=await fetch(API+'/oauth/tokens');
    const data=await r.json();
    const tokens=Array.isArray(data)?data:data.tokens||[];
    render(tokens);
  }catch(e){document.getElementById('list').innerHTML='<div class="empty">Error: '+esc(e.message)+'</div>'}
}

function render(tokens){
  const el=document.getElementById('list');
  document.getElementById('count').textContent=tokens.length+' tokens';
  if(!tokens.length){el.innerHTML='<div class="empty">No active tokens</div>';return}
  el.innerHTML='<table><thead><tr><th>Client</th><th>Token (prefix)</th><th>Scope</th><th>Expires</th><th>Status</th><th>Actions</th></tr></thead><tbody>'+
    tokens.map(t=>{
      const exp=t.expires_at||t.exp?new Date((t.expires_at||t.exp)*1000):null;
      const isExp=exp&&exp<new Date();
      const prefix=(t.access_token||t.token_id||t.jti||'').substring(0,12);
      return `<tr>
        <td>${esc(t.client_id||'—')}</td>
        <td class="mono">${esc(prefix)}...</td>
        <td>${esc(t.scope||'—')}</td>
        <td class="mono">${exp?exp.toLocaleString():'—'}</td>
        <td class="${isExp?'expired':'active'}">${isExp?'Expired':'Active'}</td>
        <td>
          <button class="btn" onclick="inspect('${esc(t.access_token||t.token_id||'')}')">🔍</button>
          <button class="btn btn-danger" onclick="revoke('${esc(t.access_token||t.token_id||'')}')">Revoke</button>
        </td></tr>`;
    }).join('')+'</tbody></table>';
}

async function revoke(token){
  if(!confirm('Revoke this token?'))return;
  await fetch(API+'/oauth/revoke',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:'token='+encodeURIComponent(token)});
  load();
}

async function inspect(token){
  const el=document.getElementById('inspect');
  try{
    const r=await fetch(API+'/oauth/introspect',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:'token='+encodeURIComponent(token)});
    const data=await r.json();
    el.textContent=JSON.stringify(data,null,2);
    el.style.display='block';
  }catch(e){el.textContent='Error: '+e.message;el.style.display='block'}
}

load();
document.getElementById('themeToggle').addEventListener('click',()=>{const t=document.documentElement.dataset.theme==='dark'?'light':'dark';document.documentElement.dataset.theme=t;localStorage.setItem('oauth4os_theme',t)});
if(localStorage.getItem('oauth4os_theme'))document.documentElement.dataset.theme=localStorage.getItem('oauth4os_theme');
</script>
<script src="/web/feedback.js"></script>
</body>
</html>
