<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>oauth4os — Token Analytics</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#0f172a;color:#e2e8f0;padding:24px}
h1{font-size:1.5rem;margin-bottom:4px}
.subtitle{color:#94a3b8;margin-bottom:24px;font-size:.875rem}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:1200px;margin:0 auto}
.card{background:#1e293b;border-radius:12px;padding:20px;border:1px solid #334155}
.card h2{font-size:.95rem;color:#94a3b8;margin-bottom:12px}
.full{grid-column:1/-1}
table{width:100%;border-collapse:collapse;font-size:.85rem}
th{text-align:left;color:#64748b;padding:6px 8px;border-bottom:1px solid #334155}
td{padding:6px 8px;border-bottom:1px solid #1e293b}
.num{text-align:right;font-variant-numeric:tabular-nums}
.bar{height:6px;background:#3b82f6;border-radius:3px;margin-top:2px}
.err{color:#f87171}
.ok{color:#4ade80}
canvas{max-height:260px}
.status{display:flex;gap:16px;align-items:center;margin-bottom:20px;max-width:1200px;margin:0 auto 20px}
.stat{background:#1e293b;border-radius:8px;padding:12px 20px;border:1px solid #334155;text-align:center}
.stat .val{font-size:1.5rem;font-weight:700}
.stat .lbl{font-size:.75rem;color:#64748b}
#error{color:#f87171;text-align:center;padding:20px;display:none}
[data-theme="light"]{--bg:#f6f8fa;--surface:#fff;--border:#d0d7de;--text:#1f2328;--muted:#656d76;--accent:#0969da;--green:#1a7f37;--orange:#bc4c00;--red:#cf222e}
</style>
</head>
<body>
<h1>🔐 oauth4os Analytics</h1>
<p class="subtitle">Token usage, scope distribution, and request metrics — refreshes every 5s</p>

<div id="error"></div>

<div class="status" id="stats"></div>

<div class="grid">
  <div class="card">
    <h2>Top Clients by Request Count</h2>
    <canvas id="clientsChart"></canvas>
  </div>
  <div class="card">
    <h2>Scope Distribution</h2>
    <canvas id="scopesChart"></canvas>
  </div>
  <div class="card">
    <h2>Top Clients</h2>
    <div id="clientsTable"></div>
  </div>
  <div class="card">
    <h2>Top Indices</h2>
    <div id="indicesTable"></div>
  </div>
  <div class="card full">
    <h2>Request Timeline</h2>
    <canvas id="timelineChart"></canvas>
  </div>
</div>

<script>
const BASE = window.OAUTH4OS_URL || location.origin;
const COLORS = ['#3b82f6','#8b5cf6','#ec4899','#f59e0b','#10b981','#06b6d4','#f43f5e','#84cc16'];

let clientsChart, scopesChart, timelineChart;
const timelineData = { labels: [], requests: [], errors: [] };

function initCharts() {
  clientsChart = new Chart(document.getElementById('clientsChart'), {
    type: 'bar',
    data: { labels: [], datasets: [{ label: 'Requests', data: [], backgroundColor: '#3b82f6' }] },
    options: { indexAxis: 'y', responsive: true, plugins: { legend: { display: false } },
      scales: { x: { ticks: { color: '#64748b' }, grid: { color: '#1e293b' } },
                y: { ticks: { color: '#e2e8f0' }, grid: { display: false } } } }
  });
  scopesChart = new Chart(document.getElementById('scopesChart'), {
    type: 'doughnut',
    data: { labels: [], datasets: [{ data: [], backgroundColor: COLORS }] },
    options: { responsive: true, plugins: { legend: { position: 'right', labels: { color: '#e2e8f0', font: { size: 11 } } } } }
  });
  timelineChart = new Chart(document.getElementById('timelineChart'), {
    type: 'line',
    data: { labels: [], datasets: [
      { label: 'Total Requests', data: [], borderColor: '#3b82f6', tension: .3, fill: false },
      { label: 'Auth Failures', data: [], borderColor: '#f43f5e', tension: .3, fill: false }
    ]},
    options: { responsive: true,
      scales: { x: { ticks: { color: '#64748b' }, grid: { color: '#1e293b' } },
                y: { ticks: { color: '#64748b' }, grid: { color: '#1e293b' }, beginAtZero: true } },
      plugins: { legend: { labels: { color: '#e2e8f0' } } } }
  });
}

async function fetchData() {
  try {
    const [analytics, metrics] = await Promise.all([
      fetch(BASE + '/admin/analytics').then(r => r.json()),
      fetch(BASE + '/metrics').then(r => r.text()).catch(() => '')
    ]);
    document.getElementById('error').style.display = 'none';
    updateCharts(analytics);
    updateTables(analytics);
    updateStats(analytics, metrics);
    updateTimeline(analytics, metrics);
  } catch (e) {
    document.getElementById('error').textContent = 'Failed to fetch: ' + e.message;
    document.getElementById('error').style.display = 'block';
  }
}

function updateCharts(d) {
  const clients = (d.top_clients || []).slice(0, 8);
  clientsChart.data.labels = clients.map(c => c.client_id);
  clientsChart.data.datasets[0].data = clients.map(c => c.requests);
  clientsChart.update();

  const scopes = d.scope_distribution || [];
  scopesChart.data.labels = scopes.map(s => s.name);
  scopesChart.data.datasets[0].data = scopes.map(s => s.count);
  scopesChart.update();
}

function updateTables(d) {
  const clients = (d.top_clients || []).slice(0, 10);
  const maxReq = clients[0]?.requests || 1;
  document.getElementById('clientsTable').innerHTML = '<table><tr><th>Client</th><th>Requests</th><th>Last Seen</th></tr>' +
    clients.map(c => `<tr><td>${esc(c.client_id)}</td><td class="num">${c.requests}<div class="bar" style="width:${(c.requests/maxReq*100)}%"></div></td><td>${ago(c.last_seen)}</td></tr>`).join('') + '</table>';

  const indices = (d.top_indices || []).slice(0, 10);
  const maxIdx = indices[0]?.count || 1;
  document.getElementById('indicesTable').innerHTML = '<table><tr><th>Index</th><th>Queries</th></tr>' +
    indices.map(i => `<tr><td>${esc(i.name)}</td><td class="num">${i.count}<div class="bar" style="width:${(i.count/maxIdx*100)}%"></div></td></tr>`).join('') + '</table>';
}

function updateStats(d, metrics) {
  const total = (d.top_clients || []).reduce((s, c) => s + c.requests, 0);
  const clients = (d.top_clients || []).length;
  const scopes = (d.scope_distribution || []).length;
  const authFail = parseMetric(metrics, 'oauth4os_auth_failed') || 0;
  const rateLimited = parseMetric(metrics, 'oauth4os_rate_limited') || 0;
  document.getElementById('stats').innerHTML =
    stat(total, 'Total Requests') + stat(clients, 'Active Clients') +
    stat(scopes, 'Scopes Used') + stat(authFail, 'Auth Failures', authFail > 0) +
    stat(rateLimited, 'Rate Limited', rateLimited > 0);
}

function updateTimeline(d, metrics) {
  const now = new Date().toLocaleTimeString();
  const total = (d.top_clients || []).reduce((s, c) => s + c.requests, 0);
  const errors = parseMetric(metrics, 'oauth4os_auth_failed') || 0;
  timelineData.labels.push(now);
  timelineData.requests.push(total);
  timelineData.errors.push(errors);
  if (timelineData.labels.length > 60) {
    timelineData.labels.shift(); timelineData.requests.shift(); timelineData.errors.shift();
  }
  timelineChart.data.labels = timelineData.labels;
  timelineChart.data.datasets[0].data = timelineData.requests;
  timelineChart.data.datasets[1].data = timelineData.errors;
  timelineChart.update();
}

function parseMetric(text, name) {
  const m = text.match(new RegExp('^' + name + '\\s+(\\d+)', 'm'));
  return m ? parseInt(m[1]) : 0;
}

function stat(val, label, isErr) {
  return `<div class="stat"><div class="val ${isErr ? 'err' : ''}">${val.toLocaleString()}</div><div class="lbl">${label}</div></div>`;
}

function ago(ts) {
  if (!ts) return '—';
  const s = Math.floor((Date.now() - new Date(ts)) / 1000);
  if (s < 60) return s + 's ago';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  return Math.floor(s/3600) + 'h ago';
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

initCharts();
fetchData();
setInterval(fetchData, 5000);
</script>
<script src="/web/layout.js"></script>
</body>
</html>
