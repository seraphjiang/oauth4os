<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>oauth4os — Trace Viewer</title>
<style>
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#58a6ff;--green:#3fb950;--orange:#f0883e;--purple:#bc8cff;--red:#f85149}
[data-theme="light"]{--bg:#f6f8fa;--surface:#fff;--border:#d0d7de;--text:#1f2328;--muted:#656d76;--accent:#0969da;--green:#1a7f37;--orange:#bc4c00;--purple:#8250df;--red:#cf222e}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
a{color:var(--accent);text-decoration:none}
code{background:var(--surface);padding:2px 6px;border-radius:4px;font-size:12px;font-family:'SF Mono',Consolas,monospace}
header{padding:10px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.logo{font-size:16px;font-weight:700}.logo span{color:var(--accent)}
header nav{display:flex;gap:12px;align-items:center}
header nav a{color:var(--muted);font-size:13px}
.theme-btn{background:none;border:1px solid var(--border);border-radius:4px;padding:2px 6px;cursor:pointer;font-size:13px;color:var(--text)}
.container{max-width:900px;margin:0 auto;padding:20px}
.toolbar{display:flex;gap:8px;margin-bottom:16px;align-items:center;flex-wrap:wrap}
.btn{padding:8px 16px;border-radius:6px;font-size:13px;font-weight:600;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer}
.btn:hover{border-color:var(--accent)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-sm{padding:4px 10px;font-size:11px}
input{padding:8px 12px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);font-size:13px;font-family:'SF Mono',Consolas,monospace}
input:focus{outline:none;border-color:var(--accent)}

/* Trace summary */
.trace-summary{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:16px;display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.ts-item .label{font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:600}
.ts-item .val{font-size:14px;font-weight:600;font-family:'SF Mono',Consolas,monospace}
.status-ok{color:var(--green)}.status-err{color:var(--red)}

/* Waterfall */
.waterfall{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.wf-header{display:grid;grid-template-columns:180px 1fr 60px;padding:8px 12px;border-bottom:1px solid var(--border);font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:600}
.wf-row{display:grid;grid-template-columns:180px 1fr 60px;padding:6px 12px;border-bottom:1px solid var(--border);align-items:center;font-size:12px;cursor:pointer;transition:background .1s}
.wf-row:hover{background:var(--bg)}
.wf-row.active{background:var(--bg)}
.wf-name{display:flex;align-items:center;gap:6px}
.wf-icon{font-size:14px}
.wf-bar-track{height:16px;position:relative;border-radius:3px}
.wf-bar{position:absolute;height:100%;border-radius:3px;min-width:2px;transition:width .3s}
.wf-dur{font-size:11px;color:var(--muted);text-align:right;font-family:'SF Mono',Consolas,monospace}
/* Ticks */
.wf-ticks{display:grid;grid-template-columns:180px 1fr 60px;padding:2px 12px;font-size:9px;color:var(--muted)}
.wf-tick-track{display:flex;justify-content:space-between}

/* Detail panel */
.detail{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;margin-top:12px;display:none}
.detail.open{display:block}
.detail h3{font-size:14px;margin-bottom:8px}
.detail-grid{display:grid;grid-template-columns:120px 1fr;gap:4px 12px;font-size:12px}
.detail-grid .dk{color:var(--muted)}
.detail-grid .dv{font-family:'SF Mono',Consolas,monospace;word-break:break-all}

.skeleton{background:linear-gradient(90deg,var(--surface) 25%,var(--border) 50%,var(--surface) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px;height:16px;margin-bottom:6px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.error-boundary{background:var(--surface);border:1px solid var(--red);border-radius:12px;padding:40px;text-align:center;margin:60px auto;max-width:500px}
.error-boundary .icon{font-size:48px;margin-bottom:12px}
.error-boundary button{padding:8px 20px;border-radius:6px;border:none;background:var(--accent);color:#fff;cursor:pointer}

@media(max-width:375px){
  .trace-summary{grid-template-columns:repeat(2,1fr)}
  .wf-header,.wf-row,.wf-ticks{grid-template-columns:120px 1fr 40px}
  .wf-name{font-size:11px}
}
</style>
</head>
<body>
<header>
  <div class="logo">🔬 Trace <span>Viewer</span></div>
  <nav>
    <a href="./">Demo App</a>
    <a href="services.html">Map</a>
    <a href="alerts.html">Alerts</a>
    <a href="../">← oauth4os</a>
    <button class="theme-btn" id="themeToggle" aria-label="Toggle theme">🌓</button>
  </nav>
</header>
<div class="container">
  <div class="toolbar">
    <input id="reqId" placeholder="X-Request-ID or click Trace Live" style="flex:1;min-width:200px" aria-label="Request ID">
    <button class="btn btn-primary" id="traceBtn" aria-label="Trace a live request">⚡ Trace Live</button>
    <button class="btn btn-sm" id="clearBtn">Clear</button>
  </div>
  <div id="summary"></div>
  <div id="waterfall"></div>
  <div class="detail" id="detail"></div>
</div>
<script>
const PROXY = window.location.origin;
let token = sessionStorage.getItem('oauth4os_token');
let spans = [];
let selected = -1;

const SPAN_DEFS = [
  { name:'Incoming Request',   icon:'📥', color:'var(--accent)',  phase:'receive' },
  { name:'JWT Validation',     icon:'🔑', color:'var(--purple)',  phase:'auth' },
  { name:'Scope Check',        icon:'🎯', color:'var(--green)',   phase:'authz' },
  { name:'Cedar Policy Eval',  icon:'🌲', color:'var(--green)',   phase:'cedar' },
  { name:'Rate Limit Check',   icon:'⚡', color:'var(--orange)',  phase:'ratelimit' },
  { name:'SigV4 Signing',      icon:'✍️', color:'var(--orange)',  phase:'sigv4' },
  { name:'Upstream Request',   icon:'📡', color:'var(--accent)',  phase:'upstream' },
  { name:'Response',           icon:'📤', color:'var(--green)',   phase:'response' },
];

async function getToken() {
  if (token) return;
  try {
    const r = await fetch(PROXY + '/oauth/token', {
      method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: 'grant_type=client_credentials&client_id=demo-agent&client_secret=demo-secret&scope=read:logs-*'
    });
    if (r.ok) { const d = await r.json(); token = d.access_token; sessionStorage.setItem('oauth4os_token', token); }
  } catch {}
}

async function traceLive() {
  await getToken();
  // Show skeletons
  document.getElementById('waterfall').innerHTML = Array(8).fill('<div style="padding:6px 12px"><div class="skeleton"></div></div>').join('');
  document.getElementById('summary').innerHTML = '';
  document.getElementById('detail').classList.remove('open');

  const start = performance.now();
  let reqId = '', status = 200, totalMs = 0;

  try {
    const r = await fetch(PROXY + '/logs-*/_search', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + (token || ''), 'Content-Type': 'application/json' },
      body: JSON.stringify({ query: { match_all: {} }, size: 1 })
    });
    totalMs = performance.now() - start;
    reqId = r.headers.get('X-Request-ID') || r.headers.get('x-request-id') || crypto.randomUUID().slice(0, 8);
    status = r.status;
    document.getElementById('reqId').value = reqId;
  } catch (e) {
    totalMs = performance.now() - start;
    reqId = 'err-' + Date.now().toString(36);
    status = 0;
  }

  // Build realistic spans from total time
  buildSpans(totalMs, status, reqId);
  render();
}

function buildSpans(totalMs, status, reqId) {
  const traceId = crypto.randomUUID().replace(/-/g, '');
  // Distribute time realistically across phases
  const t = Math.max(totalMs, 5);
  const ratios = [0.02, 0.08, 0.03, 0.04, 0.02, 0.12, 0.62, 0.07];
  let offset = 0;
  let parentSpanId = '';
  spans = SPAN_DEFS.map((def, i) => {
    const dur = Math.max(0.1, t * ratios[i] * (0.8 + Math.random() * 0.4));
    const spanId = crypto.randomUUID().replace(/-/g, '').slice(0, 16);
    const span = {
      ...def, start: offset, duration: dur, status: 'ok',
      traceId, spanId, parentSpanId: parentSpanId || '',
      meta: getSpanMeta(def.phase, reqId, dur, status)
    };
    span.meta['trace.trace_id'] = traceId;
    span.meta['trace.span_id'] = spanId;
    if (parentSpanId) span.meta['trace.parent_span_id'] = parentSpanId;
    parentSpanId = spanId;
    offset += dur;
    return span;
  });
  // Mark error on upstream if status >= 400
  if (status >= 400) {
    spans[6].status = 'error';
    spans[7].status = 'error';
  }
  spans._total = offset;
  spans._status = status;
  spans._reqId = reqId;
  spans._traceId = traceId;
}

function getSpanMeta(phase, reqId, dur, status) {
  const m = { 'request_id': reqId };
  switch (phase) {
    case 'receive': Object.assign(m, { method:'POST', path:'/logs-*/_search', 'content-type':'application/json' }); break;
    case 'auth': Object.assign(m, { algorithm:'RS256', issuer:'oauth4os', 'jwks_cached':'true', 'token_type':'Bearer' }); break;
    case 'authz': Object.assign(m, { scope:'read:logs-*', 'mapped_role':'logs_reader', 'index_pattern':'logs-*' }); break;
    case 'cedar': Object.assign(m, { policies_evaluated:'3', decision:'ALLOW', 'effect':'permit' }); break;
    case 'ratelimit': Object.assign(m, { bucket:'demo-agent', remaining:'98', limit:'100/min' }); break;
    case 'sigv4': Object.assign(m, { service:'aoss', region:'us-west-2', 'credential_source':'IAM role' }); break;
    case 'upstream': Object.assign(m, { host:'*.us-west-2.aoss.amazonaws.com', status: String(status), 'tls':'1.3' }); break;
    case 'response': Object.assign(m, { status: String(status), 'content-encoding':'gzip' }); break;
  }
  return m;
}

function render() {
  if (!spans.length) return;
  const total = spans._total;

  // Summary
  document.getElementById('summary').innerHTML = `<div class="trace-summary">
    <div class="ts-item"><div class="label">Trace ID</div><div class="val" style="font-size:11px">${esc((spans._traceId || '').slice(0, 16))}...</div></div>
    <div class="ts-item"><div class="label">Request ID</div><div class="val">${esc(spans._reqId)}</div></div>
    <div class="ts-item"><div class="label">Status</div><div class="val ${spans._status < 400 ? 'status-ok' : 'status-err'}">${spans._status || 'ERR'}</div></div>
    <div class="ts-item"><div class="label">Total / Spans</div><div class="val">${total.toFixed(1)}ms / ${spans.length}</div></div>
  </div>`;

  // Ticks
  const ticks = [0, 25, 50, 75, 100].map(p => (total * p / 100).toFixed(1) + 'ms');

  // Waterfall
  let html = `<div class="waterfall">
    <div class="wf-ticks"><div></div><div class="wf-tick-track">${ticks.map(t => `<span>${t}</span>`).join('')}</div><div></div></div>
    <div class="wf-header"><div>Span</div><div>Timeline</div><div>Duration</div></div>`;

  spans.forEach((s, i) => {
    const left = (s.start / total * 100).toFixed(2);
    const width = Math.max(0.5, s.duration / total * 100).toFixed(2);
    const barColor = s.status === 'error' ? 'var(--red)' : s.color;
    html += `<div class="wf-row ${selected === i ? 'active' : ''}" data-idx="${i}">
      <div class="wf-name"><span class="wf-icon">${s.icon}</span>${s.name}</div>
      <div class="wf-bar-track"><div class="wf-bar" style="left:${left}%;width:${width}%;background:${barColor};opacity:0.8"></div></div>
      <div class="wf-dur">${s.duration.toFixed(1)}ms</div>
    </div>`;
  });
  html += '</div>';
  document.getElementById('waterfall').innerHTML = html;

  // Click handlers
  document.querySelectorAll('.wf-row').forEach(row => {
    row.addEventListener('click', () => {
      selected = parseInt(row.dataset.idx);
      render();
      showDetail(selected);
    });
  });

  if (selected >= 0) showDetail(selected);
}

function showDetail(i) {
  const s = spans[i];
  const el = document.getElementById('detail');
  el.classList.add('open');
  let grid = Object.entries(s.meta).map(([k, v]) => `<div class="dk">${esc(k)}</div><div class="dv">${esc(v)}</div>`).join('');
  el.innerHTML = `<h3>${s.icon} ${s.name} <span style="font-size:12px;color:var(--muted)">${s.duration.toFixed(2)}ms</span></h3>
    <div class="detail-grid">
      <div class="dk">Span ID</div><div class="dv">${esc(s.spanId)}</div>
      <div class="dk">Parent Span</div><div class="dv">${s.parentSpanId ? esc(s.parentSpanId) : '<span style="color:var(--muted)">— (root)</span>'}</div>
      <div class="dk">Phase</div><div class="dv">${s.phase}</div>
      <div class="dk">Status</div><div class="dv ${s.status === 'ok' ? 'status-ok' : 'status-err'}">${s.status}</div>
      <div class="dk">Start</div><div class="dv">${s.start.toFixed(2)}ms</div>
      <div class="dk">Duration</div><div class="dv">${s.duration.toFixed(2)}ms</div>
      ${grid}
    </div>`;
}

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

document.getElementById('traceBtn').addEventListener('click', traceLive);
document.getElementById('clearBtn').addEventListener('click', () => {
  spans = []; selected = -1;
  document.getElementById('summary').innerHTML = '';
  document.getElementById('waterfall').innerHTML = '';
  document.getElementById('detail').classList.remove('open');
  document.getElementById('reqId').value = '';
});

// Error boundary
window.addEventListener('error', e => {
  if (e.message?.includes('Script error')) return;
  document.querySelector('.container').innerHTML = `<div class="error-boundary"><div class="icon">⚠️</div><h2>Something went wrong</h2><p>${esc(e.message)}</p><button onclick="location.reload()">Reload</button></div>`;
});

// Theme
document.getElementById('themeToggle').addEventListener('click', () => {
  const t = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = t;
  localStorage.setItem('oauth4os_theme', t);
});
const saved = localStorage.getItem('oauth4os_theme');
if (saved) document.documentElement.dataset.theme = saved;
</script>
</body>
</html>
